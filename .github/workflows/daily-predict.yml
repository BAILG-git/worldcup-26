name: Fetch ESPN Data & Generate Predictions

on:
  schedule:
    # 每小时执行一次（UTC 0-23点 = 北京时间8-次日7点）
    - cron: '0 * * * *'
    # 比赛日加密执行：每5分钟检查一次（UTC 12-23 = 北京时间20-次日7点）
    - cron: '*/5 12-23 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Generate predictions
        run: |
          cd predictor
          python fetch_and_predict.py
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/predictions.json data/matches.json
          git commit -m "auto: daily predictions update" || echo "No changes to commit"
          git push
