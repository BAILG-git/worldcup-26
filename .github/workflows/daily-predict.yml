name: Fetch ESPN Data & Generate Predictions

on:
  schedule:
    # 每5分钟检查一次（UTC 0-23 = 北京时间8-次日7点）
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Fetch ESPN data and generate predictions
        run: |
          cd predictor
          python fetch_and_predict.py
        env:
          PYTHONUNBUFFERED: 1
          
      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/predictions.json data/matches.json || true
          git diff --cached --quiet || (git commit -m "auto: update matches & predictions $(date -u +'%Y-%m-%d %H:%M')" && git push)
