<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 United States, Canada, Mexic</title>
<style>
:root {
  --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9;
  --muted:#8b949e; --gold:#f0c040; --green:#3fb950; --red:#f85149;
  --blue:#58a6ff; --accent:#d2a8ff; --up:#2ea043; --down:#1f6feb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:16px}
h1{text-align:center;font-size:26px;margin-bottom:4px}
.sub{text-align:center;color:var(--gold);font-size:14px;margin-bottom:12px}

/* status bar */
.status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:12px;flex-wrap:wrap}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
.status-dot.live{background:var(--green);animation:blink .8s infinite}
@keyframes blink{50%{opacity:.3}}

/* tabs */
.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;
  background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
.tab-btn:hover,.tab-btn.active{border-color:var(--gold);color:var(--gold)}

/* groups grid */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:12px;margin-bottom:20px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.group-header{padding:8px 14px;font-weight:bold;font-size:15px;border-bottom:1px solid var(--border);
  background:#1a1f2b;display:flex;justify-content:space-between;align-items:center}
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{background:#1a1f2b;padding:6px 8px;text-align:center;color:var(--muted);font-weight:normal;font-size:11px;border-bottom:1px solid var(--border)}
.standings-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(48,54,61,.5)}
.standings-table .team-name{text-align:left;font-weight:bold}
.standings-table .flag{font-size:16px;margin-right:4px;vertical-align:-2px}
.standings-table tr.top2 td{background:rgba(63,185,80,.08)}
.standings-table tr.third td{background:rgba(210,168,255,.06)}
.standings-table tr.elim td{opacity:.45}
.rank-dot{font-weight:bold;font-size:12px}
.pos-1{color:var(--gold)} .pos-2{color:var(--green)} .pos-3{color:var(--accent)} .pos-4{color:var(--muted)}

/* match rows */
/* ========== MATCH CARDS GRID ========== */
#tab-matches{padding:12px;overflow-y:auto;height:calc(100vh - 160px)}
.match-date-block{margin-bottom:16px}
.match-date-header{font-weight:bold;font-size:14px;color:var(--gold);margin-bottom:8px;padding-left:4px}
.match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1200px){.match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  body{padding:8px}
  h1{font-size:20px}
  .sub{font-size:12px;margin-bottom:8px}
  .status-bar{font-size:10px;padding:6px 10px;gap:8px}
  .tabs{gap:3px;margin-bottom:10px}
  .tab-btn{padding:5px 10px;font-size:11px}
  .match-date-block{margin-bottom:10px}
  .match-date-header{font-size:13px;margin-bottom:6px}
  .match-grid{grid-template-columns:1fr;gap:8px}
  .mc-head{padding:6px 8px 6px 35px;font-size:10px}
  .mc-time{font-size:11px}
  .mc-venue{font-size:9px}
  .mc-body{padding:6px 8px;gap:4px}
  .mc-vs{font-size:13px;gap:4px}
  .mc-vs b{font-size:10px;margin:0 1px}
  .mc-group-tag{font-size:8px;top:3px;left:5px}
  .mc-status{font-size:9px;padding:1px 4px}
  .mc-clock{font-size:10px;margin-left:2px}
  .mc-detail{padding:3px 8px 4px;font-size:9px}
  .mc-detail .dval{font-size:12px}
  .mc-verify{padding:2px 8px 4px;font-size:10px}
  .groups-grid{grid-template-columns:1fr;gap:8px}
  .standings-table{font-size:11px}
  .standings-table th,.standings-table td{padding:4px 5px}
  .modal-panel{width:98vw;max-height:95vh;border-radius:8px}
  .modal-header{padding:10px 12px 6px}
  .modal-header .mh-teams{font-size:15px;gap:8px}
  .modal-section{padding:8px 12px}
  .modal-section h4{font-size:12px}
  .modal-section .info-row{font-size:11px}
  .modal-section .player-table{font-size:10px}
  .prediction-box .pred-item .pred-val{font-size:18px}
  .modal-close{width:28px;height:28px;font-size:16px;margin:6px 6px 0 0}
  #tab-matches{padding:8px;height:calc(100vh - 140px)}
  #tab-bracket{height:calc(100vh - 140px)}
  .bracket-zoom-bar button{width:24px;height:24px;font-size:14px}
  .final-box{min-width:70px;padding:6px 8px}
  .final-box .f-title{font-size:10px}
  .bslot{font-size:8px;padding:2px 3px;min-height:20px}
  .bslot .team{font-size:10px}
  .bslot .desc{font-size:8px}
}
.match-card{border:1px solid rgba(240,192,64,.35);border-radius:8px;background:var(--card);overflow:hidden;transition:.15s;position:relative}
.match-card:hover{border-color:rgba(240,192,64,.6)}
.match-card.upset{border-color:#e5534b;background:rgba(229,83,75,.08);box-shadow:0 0 8px rgba(229,83,75,.25)}
.match-card.upset .mc-head{background:rgba(229,83,75,.18)}
.upset-badge{position:absolute;bottom:6px;right:8px;font-size:9px;background:rgba(229,83,75,.9);color:#fff;padding:2px 6px;border-radius:3px;font-weight:bold;z-index:2}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 7px 40px;font-size:11px;color:var(--muted);background:rgba(13,17,23,.5);border-bottom:1px solid var(--border)}
.mc-time{color:#f0c040;font-weight:bold;font-size:13px}
.mc-venue{font-size:10px;opacity:.8}
.mc-body{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.mc-team{display:flex;align-items:center;justify-content:space-between;font-size:13px;line-height:1.4}
.mc-team .tname{font-weight:bold}
.mc-vs{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:bold;padding:4px 0}
.mc-vs b{color:var(--muted);font-size:11px;margin:0 2px}
.mc-group-tag{position:absolute;top:4px;left:6px;font-size:9px;background:rgba(240,192,64,.15);color:var(--gold);padding:1px 5px;border-radius:3px;font-weight:bold}
.match-card{cursor:pointer}
/* 状态标签 */
.mc-status{font-size:10px;font-weight:bold;padding:2px 6px;border-radius:3px;white-space:nowrap}
.mc-clock{font-size:11px;font-weight:bold;color:var(--green);margin-left:4px;white-space:nowrap}
.mc-status.live{background:rgba(46,160,67,.15);color:#2ea043;animation:pulse 1.5s infinite}
.mc-status.finished{background:rgba(240,192,64,.15);color:#f0c040}
.mc-status.upcoming{background:rgba(125,133,144,.15);color:#7d8590}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
/* 比分详情行 */
.mc-detail{display:flex;justify-content:space-around;padding:4px 10px 6px;border-top:1px solid rgba(48,54,61,.2);font-size:10px;color:var(--muted)}
.mc-detail .ditem{text-align:center}
.mc-detail .dval{font-size:13px;font-weight:bold;color:var(--text)}
.mc-pred,.mc-verify{display:grid!important;grid-template-columns:0.7fr 1.8fr 1fr 0.8fr;align-items:center;font-size:11px;color:var(--muted);gap:0;padding:3px 10px}
.mc-pred{background:rgba(31,111,235,.08);padding-top:5px;padding-bottom:2px}
.mc-verify{padding-top:2px;padding-bottom:5px}
.mc-pred span,.mc-verify span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.mc-pred span:nth-child(1),.mc-verify span:nth-child(1){font-weight:bold}
.mc-pred b{color:var(--blue);font-weight:bold;font-size:13px}
.mc-pred+.mc-verify{border-top:1px solid rgba(48,54,61,.25)}
.mc-verify .v-ok{color:var(--green);font-weight:bold;font-size:13px}
.mc-verify .v-no{color:var(--red);font-weight:bold;font-size:13px}

/* ========== MATCH DETAIL MODAL ========== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;width:min(900px,95vw);max-height:90vh;overflow-y:auto;padding:0}
.modal-close{position:sticky;top:0;float:right;width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:#1a1f2b;color:var(--text);cursor:pointer;font-size:18px;z-index:5;margin:8px 8px 0 0;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-header{padding:14px 18px 8px;border-bottom:1px solid var(--border)}
.modal-header .mh-teams{display:flex;align-items:center;justify-content:center;gap:12px;font-size:18px;font-weight:bold;margin-bottom:6px}
.modal-header .mh-vs{color:var(--muted);font-size:14px}
.modal-header .mh-meta{text-align:center;font-size:12px;color:var(--muted)}
.modal-section{padding:12px 18px;border-bottom:1px solid rgba(48,54,61,.3)}
.modal-section:last-child{border-bottom:none}
.modal-section h4{font-size:13px;color:var(--gold);margin-bottom:8px}
.modal-section .info-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text)}
.modal-section .info-row .label{color:var(--muted)}
.modal-section .info-row .val{font-weight:bold}
.modal-section .player-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.modal-section .player-table th{text-align:left;padding:4px 6px;color:var(--muted);font-weight:normal;font-size:10px;border-bottom:1px solid var(--border)}
.modal-section .player-table td{padding:4px 6px;border-bottom:1px solid rgba(48,54,61,.2)}
.modal-section .player-table .pv{text-align:right;font-weight:bold;color:var(--gold)}
.modal-section .missing-tag{display:inline-block;font-size:11px;background:rgba(248,81,73,.15);color:var(--red);padding:2px 8px;border-radius:3px;margin:2px 4px 2px 0}
.modal-section .prediction-box{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.25);border-radius:8px;padding:12px;margin-top:6px}
.prediction-box .pred-row{display:flex;justify-content:space-around;text-align:center;margin-bottom:8px}
.prediction-box .pred-item{flex:1}
.prediction-box .pred-item .pred-label{font-size:11px;color:var(--muted)}
.prediction-box .pred-item .pred-val{font-size:22px;font-weight:bold;color:var(--gold)}
.prediction-box .pred-reason{font-size:12px;color:var(--text);line-height:1.6;border-top:1px solid rgba(48,54,61,.3);padding-top:8px;margin-top:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ========== BRACKET ZOOM + PAN ========== */
#tab-bracket{display:flex;flex-direction:column;align-items:center;height:calc(100vh - 160px);overflow:hidden}
.bracket-zoom-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;z-index:10}
.bracket-zoom-bar button{width:28px;height:28px;border:1px solid var(--border);border-radius:5px;background:#1a1f2b;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.bracket-zoom-bar button:hover{border-color:var(--gold);color:var(--gold)}
.bracket-zoom-bar .zoom-label{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.bracket-viewport{flex:1;width:100%;overflow:hidden;position:relative;cursor:grab;user-select:none;border:1px solid rgba(48,54,61,.3);border-radius:8px;background:rgba(13,17,23,.5)}
.bracket-viewport:active{cursor:grabbing}
.bracket-viewport.grabbing{cursor:grabbing}
.bracket-canvas{position:absolute;top:0;left:0;width:max-content;transform-origin:0 0;will-change:transform}
.bracket-canvas .full-bracket{overflow:visible!important;width:auto!important}

/* ========== FULL BRACKET ========== */
.full-bracket{display:flex;flex-direction:row;align-items:stretch;justify-content:center;gap:0;overflow-x:auto;padding:10px 0;width:100%}
.bracket-half{display:flex;flex-direction:column;flex:1 1 0;min-width:340px}
.bracket-half .half-header{text-align:center;padding:6px 10px;font-weight:bold;font-size:14px;border-radius:8px 8px 0 0;margin-bottom:4px}
.bracket-half.upper .half-header{color:var(--up);background:rgba(46,160,67,.1);border:1px solid rgba(46,160,67,.3)}
.bracket-half.lower .half-header{color:var(--down);background:rgba(31,111,235,.1);border:1px solid rgba(31,111,235,.3)}
.half-groups{text-align:center;font-size:10px;color:var(--muted);margin-bottom:6px}

/* Sub-blocks: Q-Zone */
.sub-block{margin:4px 0;border-radius:8px;padding:4px;overflow:hidden}
.sub-block-header{text-align:center;font-size:10px;font-weight:bold;padding:3px 6px;border-radius:5px;margin-bottom:3px;letter-spacing:.3px}
.sub-block .rounds-row{flex:0 0 auto}
.sub-block .r-col{border-color:transparent}

/* Q-zone colors */
.sub-q1{border:2px solid rgba(46,160,67,.55);background:rgba(46,160,67,.08)}
.sub-q1 .sub-block-header{color:#2ea03a;background:rgba(46,160,67,.25);font-size:11px;padding:4px 8px}
.sub-q2{border:2px solid rgba(217,119,6,.55);background:rgba(217,119,6,.08)}
.sub-q2 .sub-block-header{color:#d97706;background:rgba(217,119,6,.25);font-size:11px;padding:4px 8px}
.sub-q3{border:2px solid rgba(31,111,235,.55);background:rgba(31,111,235,.08)}
.sub-q3 .sub-block-header{color:#1e6feb;background:rgba(31,111,235,.25);font-size:11px;padding:4px 8px}
.sub-q4{border:2px solid rgba(139,92,246,.55);background:rgba(139,92,246,.08)}
.sub-q4 .sub-block-header{color:#8b5cf6;background:rgba(139,92,246,.25);font-size:11px;padding:4px 8px}
.q1-color{color:#2ea03a}
.q2-color{color:#d97706}
.q3-color{color:#1e6feb}
.q4-color{color:#8b5cf6}

/* rounds-row color accents */
.row-q1{background:rgba(46,160,67,.12);border-radius:4px}
.row-q2{background:rgba(217,119,6,.12);border-radius:4px}
.row-q3{background:rgba(31,111,235,.12);border-radius:4px}
.row-q4{background:rgba(139,92,246,.12);border-radius:4px}

/* bslot per Q-zone fill */
.sub-q1 .bslot{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.35)}
.sub-q1 .bslot.filled{background:rgba(46,160,67,.22);border-color:rgba(46,160,67,.6)}
.sub-q2 .bslot{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.35)}
.sub-q2 .bslot.filled{background:rgba(217,119,6,.22);border-color:rgba(217,119,6,.6)}
.sub-q3 .bslot{background:rgba(31,111,235,.12);border-color:rgba(31,111,235,.35)}
.sub-q3 .bslot.filled{background:rgba(31,111,235,.22);border-color:rgba(31,111,235,.6)}
.sub-q4 .bslot{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.35)}
.sub-q4 .bslot.filled{background:rgba(139,92,246,.22);border-color:rgba(139,92,246,.6)}

/* SF merge row */
.sf-merge-row{display:flex;justify-content:center;align-items:center;gap:12px;padding:6px 0}
.sf-merge-row .r-col{flex:0 0 auto;border-color:transparent!important}

/* rounds row: R32 → R16 → QF */
.rounds-row{display:flex;flex-direction:row;align-items:stretch;flex:1}
.r-col{display:flex;flex-direction:column;flex:1 1 0;justify-content:space-around}
.r-col.slots{border-left:1px solid var(--border);border-right:1px solid var(--border)}
.r-arrow{display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;min-width:16px;font-size:18px;flex:0 0 16px}

/* Bracket slot */
.bslot{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:2px 3px;
  padding:2px 4px;border:1px dashed var(--border);border-radius:6px;font-size:9px;text-align:center;
  background:rgba(22,27,34,.8);transition:.15s;min-height:24px;overflow:hidden;white-space:nowrap}
.bslot .flag{font-size:14px}
.bslot .team{font-weight:bold;color:var(--text);font-size:11px}
.bslot .desc{color:var(--muted);font-size:9px}
.bslot.filled{border-color:var(--green);border-style:solid;background:rgba(63,185,80,.06)}
.bslot.filled .slot-row{display:flex;align-items:center;gap:2px;justify-content:center}
.bslot.champion{border-color:var(--gold);background:linear-gradient(135deg,rgba(240,192,64,.12),rgba(240,192,64,.02))}

/* Finals center */
.finals-center{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;flex:0 0 auto;padding:0 6px}
.final-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;text-align:center;min-width:100px}
.final-box .f-title{font-size:11px;font-weight:bold;margin-bottom:4px}
.final-box.champion{border-color:var(--gold);border-width:2px;background:linear-gradient(135deg,rgba(240,192,64,.1),rgba(240,192,64,.02))}
.final-box.champion .f-title{color:var(--gold)}
.final-box .bslot{margin:2px 0;padding:4px 6px;min-width:80px}
.final-box .bslot .team{font-size:11px;font-weight:bold}
.final-box .bslot .desc{font-size:9px}

/* best 3rd table */
.best3rd-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.best3rd-table th,.best3rd-table td{padding:4px 7px;text-align:center;border:1px solid var(--border)}
.best3rd-table tr.qualify{background:rgba(63,185,80,.08)}
.best3rd-table tr.miss{opacity:.4}

/* modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px}
.modal-box h3{margin-bottom:12px}
.modal-box .score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.modal-box .score-row input{width:50px;height:32px;text-align:center;background:#0d1117;
  color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:18px}
.modal-box .btn-row{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;background:var(--card);color:var(--text)}
.btn.primary{background:var(--green);border-color:var(--green);color:#000}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.small{padding:3px 10px;font-size:11px}

@media(max-width:900px){.groups-grid{grid-template-columns:1fr}.full-bracket{flex-direction:column;align-items:center}.bracket-half{flex:0 0 auto;width:100%;min-width:0}}

/* ========== 进球弹窗 Toast ========== */
.goal-toast-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.55);z-index:2000;
  display:flex;align-items:flex-start;justify-content:center;padding-top:60px;
  animation:fadeIn .25s;
}
.goal-toast{
  background:linear-gradient(135deg,#1a2e1a 0%,#0d1117 100%);
  border:2px solid var(--gold);border-radius:14px;
  padding:18px 24px;min-width:320px;max-width:420px;
  box-shadow:0 0 40px rgba(240,192,64,0.35);
  animation:slideDown .4s cubic-bezier(.17,.67,.35,1);
  position:relative;
}
.goal-toast .goal-icon{font-size:36px;margin-bottom:6px;text-align:center}
.goal-toast .goal-time{font-size:12px;color:var(--muted);margin-bottom:4px;text-align:center}
.goal-toast .goal-scorer{font-size:18px;font-weight:bold;color:var(--gold);margin-bottom:2px;text-align:center}
.goal-toast .goal-team{font-size:13px;color:var(--text);margin-bottom:6px;text-align:center}
.goal-toast .goal-score{font-size:26px;font-weight:bold;color:var(--text);text-align:center;margin-top:8px}
.goal-toast .goal-close{
  position:absolute;top:8px;right:12px;cursor:pointer;
  color:var(--muted);font-size:18px;background:none;border:none;
}
.goal-toast .goal-close:hover{color:var(--red)}
@keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playGoalSound(){
  try{
    const ctx = getAudioCtx();
    [0,0.25,0.5].forEach((delay,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i===2 ? 880 : 660;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.25);
    });
  }catch(e){}
}
function showGoalToast(team, minute, scoreH, scoreA, home, away){
  document.getElementById('goalTime').textContent = minute || '';
  document.getElementById('goalScorer').textContent = '⚽ 进球！';
  document.getElementById('goalTeam').textContent = team + ' 进球';
  document.getElementById('goalScore').textContent = home + ' ' + scoreH + ' - ' + scoreA + ' ' + away;
  document.getElementById('goalToast').style.display = 'flex';
  playGoalSound();
  clearTimeout(window._goalToastTimer);
  window._goalToastTimer = setTimeout(closeGoalToast, 6000);
}
function closeGoalToast(){
  document.getElementById('goalToast').style.display = 'none';
  clearTimeout(window._goalToastTimer);
}

// 风格克制矩阵：styleA 对 styleB 有优势时返回正数
function styleMatchup(homeStyle, awayStyle){
  const counter = {
    "高位逼抢": ["控球压迫", "技术传控"],
    "防守反击": ["高位逼抢", "快速转换"],
    "控球压迫": ["防守反击", "稳守突击"],
    "身体对抗": ["技术传控", "快速转换"],
    "快速转换": ["身体对抗", "稳守突击"],
    "技术传控": ["防守反击", "身体对抗"],
    "稳守突击": ["高位逼抢", "控球压迫"],
  };
  let bonus = 0;
  if(counter[homeStyle] && counter[homeStyle].includes(awayStyle)) bonus += 0.25;
  if(counter[awayStyle] && counter[awayStyle].includes(homeStyle)) bonus -= 0.25;
  return bonus;
}

async function getMatchOdds(m) {
  if (!APIF_KEY) return null;
  const cacheKey = `${m.home}_${m.away}_${m.date}`;
  const now = Date.now();
  if (oddsCache[cacheKey] && oddsLastFetch[cacheKey] && now - oddsLastFetch[cacheKey] < ODDS_TTL)

  try {
    const fixUrl = `${APIF_BASE}/fixtures?league=${WC_LEAGUE_ID}&season=${WC_SEASON}&date=${m.date}`;
    const fixResp = await fetch(fixUrl, { headers: { 'x-apisports-key': APIF_KEY } });
    if (!fixResp.ok) return null;
    const fixData = await fixResp.json();
    if (!fixData.response) return null;
    const fixture = fixData.response.find(f => {
      const hn = (f.teams?.home?.name || '').toLowerCase();
      const an = (f.teams?.away?.name || '').toLowerCase();
      return hn.includes(m.home.toLowerCase()) && an.includes(m.away.toLowerCase());
    });
    if (!fixture) return null;
    const oddsUrl = `${APIF_BASE}/odds?fixture=${fixture.fixture.id}`;
    const oddsResp = await fetch(oddsUrl, { headers: { 'x-apisports-key': APIF_KEY } });
    if (!oddsResp.ok) return null;
    const oddsData = await oddsResp.json();
    if (!oddsData.response || !oddsData.response[0]) return null;
    const o = oddsData.response[0];
    const result = { euro: null, asian: null, overUnder: null };
    for (const b of (o.bookmakers || [])) {
      for (const bet of (b.bets || [])) {
        if (!result.euro && bet.name === 'Match Winner') {
          const vals = {};
          bet.values.forEach(v => { vals[v.value] = parseFloat(v.odd); });
          if (vals.Home && vals.Draw && vals.Away) result.euro = vals;
        }
        if (!result.asian && bet.name === 'Asian Handicap' && bet.values.length > 0)
          result.asian = { line: parseFloat(bet.values[0].value) };
        if (!result.overUnder && bet.name === 'Goals Over/Under') {
          const ou = bet.values.find(v => v.value && v.value.startsWith('Over'));
          if (ou) result.overUnder = parseFloat(ou.value.replace(/[^0-9.]/g, ''));
        }
      }
      if (result.euro && result.asian && result.overUnder) break;
    }
    oddsCache[cacheKey] = result;
    oddsLastFetch[cacheKey] = now;
    return result;
  } catch(e) { console.log('Odds fetch error:', e.message); return null; }
}

// 赛程时间为巴西当地时间（UTC-3），浏览器在国内的话需要+11小时转换成北京时间再比较
function fallbackLiveStatus() {
  const now = new Date();
  // 巴西 UTC-3，中国 UTC+8，时差 11 小时
  // 赛程里的 xxx月xx日 HH:MM 是巴西时间，转成 UTC 时间戳再比较
  const BRAZIL_UTC_OFFSET = -3;
  for (const [g, ms] of Object.entries(GROUP_MATCHES)) {
    for (const m of ms) {
      if (matchStatus[m.id] === 'FINISHED') continue;
      const dM = m.date.match(/(\d+)月(\d+)日/);
      const tM = m.time.match(/(\d+):(\d+)/);
      if (!dM || !tM) continue;
      const month = parseInt(dM[1]) - 1;
      const day = parseInt(dM[2]);
      const hour = parseInt(tM[1]);
      const minute = parseInt(tM[2]);
      // 巴西时间(UTC-3) → UTC = 巴西小时数 + 3
      const startUTCTs = Date.UTC(2026, month, day, hour + 3, minute, 0);
      const endUTCTs = startUTCTs + 2.5 * 3600 * 1000;
      const nowTs = now.getTime();
      // 调试输出
      if (m.home === '卡塔尔' || m.away === '瑞士' || nowTs >= startUTCTs - 3600000) {
        console.log(`fallback[${m.id}] ${m.home} vs ${m.away}: startUTC=${new Date(startUTCTs).toISOString()}, now=${now.toISOString()}, inWindow=${nowTs >= startUTCTs && nowTs <= endUTCTs}`);
      }
      if (nowTs > endUTCTs) {
        matchStatus[m.id] = 'FINISHED';
      } else if (nowTs >= startUTCTs) {
        matchStatus[m.id] = 'LIVE';
        const elapsed = Math.floor((nowTs - startUTCTs) / 60000);
        matchClock[m.id] = elapsed + '′';
      }
    }
  }
  renderMatches();
}

function processESPN(data) {
  if (!data.events) return;
  // 不清空所有状态！否则每次轮询都会把比赛状态重置为未开始
  // matchStatus/matchClock 由 updateMatchScore 按需更新，不需要在这里清空
  const sm = { 'STATUS_SCHEDULED':'SCHEDULED','STATUS_IN_PROGRESS':'LIVE','STATUS_HALFTIME':'LIVE','STATUS_FINAL':'FINISHED','STATUS_FULL_TIME':'FINISHED','STATUS_END_OF_PERIOD':'LIVE','STATUS_SECOND_HALF':'LIVE','STATUS_FIRST_HALF':'LIVE' };
  // 预建：中文队名 → 所有可能的英文拼写（用于反向匹配）
  const EN_NAMES = {};
  for (const [en, cn] of Object.entries(NAME_MAP)) {
    if (!EN_NAMES[cn]) EN_NAMES[cn] = [];
    EN_NAMES[cn].push(en);
  }
  // 也把 TN_EN 的反向加进去
  for (const [cn, en] of Object.entries(TN_EN)) {
    if (!EN_NAMES[cn]) EN_NAMES[cn] = [];
    if (!EN_NAMES[cn].includes(en)) EN_NAMES[cn].push(en);
  }
  // 模糊匹配：ESPN 英文队名 → 中文队名
  function matchTeam(espnName) {
    if (!espnName) return null;
    // 1. 精确匹配 NAME_MAP
    if (NAME_MAP[espnName]) return NAME_MAP[espnName];
    // 2. 精确匹配 TN_EN 的反向
    for (const [cn, en] of Object.entries(TN_EN)) {
      if (en === espnName) return cn;
    }
    // 3. 不区分大小写 + 去掉重音符号模糊匹配
    const norm = s => s.toLowerCase().replace(/[àáâãäåæçèéêëìíîïðñòóôõöøùúûüýþÿ]/g, c => ({à:'a',á:'a',â:'a',ã:'a',ä:'a',å:'a',æ:'ae',ç:'c',è:'e',é:'e',ê:'e',ë:'e',ì:'i',í:'i',î:'i',ï:'i',ð:'d',ñ:'n',ò:'o',ó:'o',ô:'o',õ:'o',ö:'o',ø:'o',ù:'u',ú:'u',û:'u',ü:'u',ý:'y',þ:'th',ÿ:'y'}[c]||c));
    const espnNorm = norm(espnName);
    for (const [en, cn] of Object.entries(NAME_MAP)) {
      if (norm(en) === espnNorm) return cn;
    }
    // 4. 在 GROUP_MATCHES 所有队名里找包含关系
    for (const g of Object.values(GROUP_MATCHES)) {
      for (const m of g) {
        if (m.home && espnName.toLowerCase().includes(m.home.toLowerCase().slice(0,3))) return m.home;
        if (m.away && espnName.toLowerCase().includes(m.away.toLowerCase().slice(0,3))) return m.away;
      }
    }
    return null;
  }

  for (const evt of data.events) {
    const c = evt.competitions?.[0]; if (!c) continue;
    // 兼容 homeAway / homeaway 字段名（ESPN 大小写不固定）
    const hc = c.competitors?.find(x => (x.homeAway||x.homeaway||'').toLowerCase() === 'home');
    const ac = c.competitors?.find(x => (x.homeAway||x.homeaway||'').toLowerCase() === 'away');
    if (!hc || !ac) continue;
    const hRaw = hc.team?.displayName || hc.team?.name || '';
    const aRaw = ac.team?.displayName || ac.team?.name || '';
    const h = matchTeam(hRaw), a = matchTeam(aRaw);
    if (!h || !a) continue;
    // 提取 ESPN 赔率数据（DraftKings moneyline + spread + OU）
    try {
      const espnOdds = c.odds?.[0];
      if (espnOdds) {
        const ml = espnOdds.moneyline || {};
        const ps = espnOdds.pointSpread || {};
        const mlHome = ml.home?.close?.odds || '';
        const mlAway = ml.away?.close?.odds || '';
        const mlDraw = (espnOdds.drawOdds?.moneyLine) || '';
        const spread = ps.home?.close?.line || '';
        const ou = espnOdds.overUnder || '';
        espnOddsCache[h + '_' + a] = {
          mlHome, mlAway, mlDraw, spread,
          ou: typeof ou === 'number' ? ou : parseFloat(String(ou).replace(/[^0-9.]/g, '')) || 0
        };
      }
    } catch(e) { /*赔率提取失败不影响主流程*/ }
    const st = sm[evt.status?.type?.name] || 'SCHEDULED';
    const hs = parseInt(hc.score?.value ?? hc.score) || 0, as = parseInt(ac.score?.value ?? ac.score) || 0;
    const isHT = evt.status?.type?.name === 'STATUS_HALFTIME';
    // 提取比赛时钟
    // ESPN displayClock 已格式化好，如 "45'+2'", "90'+4'"，直接用
    const period = evt.status?.period || 0;
    const rawClock = (evt.status?.displayClock || '').replace(/'/g, '′');
    let clockStr = '';
    if (st === 'LIVE') {
      if (isHT) {
        clockStr = '中场休息';
      } else if (rawClock && rawClock !== '0′') {
        // 直接用 ESPN 格式化好的时钟字符串
        clockStr = rawClock;
      } else if (period >= 1) {
        // 兜底：displayClock 为空时用 period 估算
        clockStr = period === 1 ? '45′' : '90′';
      }
    }
    // 解析进球事件详情（球员名 + 时间），存入 goalEvents
    // 用 d.scoringPlay === true 判断进球，比维护 type.id 列表更可靠
    if (c.details && c.details.length > 0) {
      const key = h + '_' + a;
      if (!goalEvents[key]) goalEvents[key] = [];
      const existingCount = goalEvents[key].length;
      let goalIdx = 0;
      for (const d of c.details) {
        if (!d.clock) continue;
        if (d.scoringPlay !== true) continue;
        if (goalIdx < existingCount) { goalIdx++; continue; }
        // 用 ESPN competitor ID 判断主客队（更可靠）
        const detailCompId = String(d.competitor?.id || d.team?.id || '');
        const hcId = String(hc.id || '');
        const acId = String(ac.id || '');
        const isHome = detailCompId === hcId;
        const teamName = isHome ? h : (detailCompId === acId ? a : h);
        const totalSec = d.clock.value || 0;
        const minute = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        const minuteStr = sec > 0 ? String(minute) + "+" + String(sec) : String(minute);
        const goalType = (d.type?.text || '').toLowerCase().includes('penalty') ? 'penalty_scored' : (d.type?.text || '').toLowerCase().includes('own') ? 'own_goal' : 'goal';
        goalEvents[key].push({ team: teamName, minute: minuteStr, clock: String(minute) + "'" + (sec > 0 ? "+" + String(sec) : ""), isHome: isHome, type: goalType });
        goalIdx++;
      }
    }

    // 半场比分获取策略：
    // 核心思路：从 details 进球事件反推上半场比分（最可靠）
    // ESPN 新接口不返回 linescores，必须从 details 解析
    let htScores = null;
    let mid = null;
    for (const ms of Object.values(GROUP_MATCHES)) {
      for (const mm of ms) {
        if (mm.home === h && mm.away === a) { mid = mm.id; break; }
      }
      if (mid) break;
    }
    // 策略1：正在中场休息，当前比分 = 半场比分
    if (isHT) {
      htScores = [hs, as];
      console.log('ESPN: ht from HT live', h, a, htScores);
    }
    // 策略2：从 details 进球事件反推（覆盖所有情况）
    // 上半场 = 60分钟以内（含伤停补时，clock.value <= 3600 秒）
    // 用 scoringPlay 判断进球，比 type.id 列表更可靠
    if (c.details && c.details.length > 0) {
      let hHt = 0, aHt = 0;
      const hcId = String(hc.id || '');
      const acId = String(ac.id || '');
      for (const d of c.details) {
        if (!d.clock || d.scoringPlay !== true) continue;
        // 上半场 cutoff：60分钟（含伤停补时，实际一般不超过55分钟）
        if (d.clock.value <= 3600) {
          const tid = String(d.team?.id || d.competitor?.id || '');
          if (tid === hcId) hHt++;
          else if (tid === acId) aHt++;
        }
      }
      htScores = [hHt, aHt];
    }
    // 策略3：比赛已在下半场，且 details 有数据，但策略2没算出结果
    // 用当前总比分 - 下半场进球数来反推
    if (!htScores && st === 'LIVE' && period === 2 && c.details && c.details.length > 0) {
      let h2Ht = 0, a2Ht = 0;
      const hcId = String(hc.id || '');
      const acId = String(ac.id || '');
      for (const d of c.details) {
        if (!d.clock || d.scoringPlay !== true) continue;
        if (d.clock.value > 3600) {
          const tid = String(d.team?.id || d.competitor?.id || '');
          if (tid === hcId) h2Ht++;
          else if (tid === acId) a2Ht++;
        }
      }
      htScores = [hs - h2Ht, as - a2Ht];
    }
    updateMatchScore(h, a, (st === 'LIVE' || st === 'FINISHED') ? [hs, as] : null, st, htScores, clockStr);
  }
}

// ========== ESPN Fastcast 详情接口 ==========
// 通过 Fastcast 推送服务获取比赛的高阶详情数据（精确半场比分、Halftime事件节点、xG等）
// 该接口只能在浏览器环境中调用（需要正确的 Origin/Referer）
let fastcastCache = {}; // { eventId: { htScores: [h,a], lastFetch: timestamp } }
async function fetchFastcastDetail(eventId, homeTeam, awayTeam) {
  // 避免频繁请求：同一场比赛5分钟内不重复请求
  const cached = fastcastCache[eventId];
  if (cached && Date.now() - cached.lastFetch < 300000) return;
  
  const topic = `gp-soccer-fifa.world-${eventId}`;
  // 策略：尝试多个可能的 message ID 获取最新 checkpoint
  // 实际比赛中消息ID会持续增长，我们从较大的值开始尝试
  for (const offset of [0, -10, -50, -100, +10, +50]) {
    // 基于当前时间的估算：一场比赛大约持续2小时，每秒约0.5-2条消息
    // 比赛开始后几小时消息ID可能在几百到几千之间
    const tryId = Math.max(1, 486 + offset); // 486 是已知的有效起始参考值
    const url = `${FASTCAST_BASE}/${topic}/message/${tryId}/checkpoint`;
    try {
      const resp = await corsFetch(url, {
        method: 'GET',
        headers: { 'Accept': 'application/json' },
        cache: 'no-cache'
      });
      if (!resp.ok) continue;
      const data = await resp.json();
      if (!data.result?.entities?.plays) continue;
      
      // 从 plays 中找 Halftime 事件获取精确半场比分
      const plays = data.result.entities.plays || [];
      let htFromHalftimeEvent = null;
      for (const p of plays) {
        if ((p.type || '').toLowerCase().includes('halftime') ||
            (p.text || '').toLowerCase().includes('halftime') ||
            (p.name || '').toLowerCase().includes('halftime')) {
          // Halftime 事件可能包含 homeScore/awayScore
          if (p.homeScore !== undefined && p.awayScore !== undefined) {
            htFromHalftimeEvent = [p.homeScore, p.awayScore];
            console.log(`Fastcast[${eventId}]: Halftime event found → ${htFromHalftimeEvent[0]}-${htFromHalftimeEvent[1]}`);
            break;
          }
        }
      }
      
      // 如果没找到 Halftime 事件，从进球事件反推（与 scoreboard 逻辑一致）
      if (!htFromHalftimeEvent && plays.length > 0) {
        let hHt = 0, aHt = 0;
        for (const p of plays) {
          const isGoal = (p.type === 'goal' || p.type === 'penalty_scored' ||
                         (p.scoringPlay === true) || p.scoreValue > 0);
          if (!isGoal) continue;
          const clockVal = p.clock || p.clockValue || p.elapsed || 0;
          if (clockVal <= 2700) { // 上半场 ≤45分钟
            if (p.teamId === 'home' || p.isHomeTeam) hHt++;
            else aHt++;
          }
        }
        if (hHt > 0 || aHt > 0) {
          htFromHalftimeEvent = [hHt, aHt];
          console.log(`Fastcast[${eventId}]: Inferred from goal events → ${htFromHalftimeEvent[0]}-${htFromHalftimeEvent[1]}`);
        }
      }
      
      // 更新缓存和半场比分
      fastcastCache[eventId] = { lastFetch: Date.now(), raw: data };
      if (htFromHalftimeEvent) {
        // 找到 mid 并更新 halftimeScores
        for (const ms of Object.values(GROUP_MATCHES)) {
          for (const mm of ms) {
            if (mm.home === homeTeam && mm.away === awayTeam) {
              halftimeScores[mm.id] = htFromHalftimeEvent;
              console.log(`Fastcast[${eventId}] → updated ${mm.id}: HT=${htFromHalftimeEvent[0]}-${htFromHalftimeEvent[1]}`);
              saveScores();
              refreshAll();
              break;
            }
          }
        }
      }
      return; // 成功获取到一个就返回
    } catch (err) {
      console.log(`Fastcast[${eventId}] try ${tryId} failed:`, err.message);
      continue;
    }
  }
  console.log(`Fastcast[${eventId}]: All attempts failed, using scoreboard data`);
}

function updateMatchScore(h, a, ns, st, htScores, clockStr) {
  // 先保存当前比分到 prevScores（供进球检测用）
  for (const ms of Object.values(GROUP_MATCHES)) {
    for (const mm of ms) {
      if (scores[mm.id]) prevScores[mm.id] = [scores[mm.id][0], scores[mm.id][1]];
    }
  }
  let updated = false;
  for (const ms of Object.values(GROUP_MATCHES))
    for (const mm of ms) {
      if (mm.home === h && mm.away === a) {
        const prev = scores[mm.id];
        if (ns && (!prev || prev[0] !== ns[0] || prev[1] !== ns[1])) updated = true;
        if (matchStatus[mm.id] !== st) updated = true;
        // 检测进球：比对前后比分
        if (ns && prev && (ns[0] > prev[0] || ns[1] > prev[1])) {
          const key = mm.home + '_' + mm.away;
          const events = goalEvents[key] || [];
          const prevGoalCount = (prev[0] + prev[1]);
          const ev = events[prevGoalCount]; // 新进球的索引
          if (ev) {
            showGoalToast(ev.team, ev.minute, ns[0], ns[1], mm.home, mm.away);
          } else {
            const scoringTeam = ns[0] > prev[0] ? mm.home : mm.away;
            showGoalToast(scoringTeam, clockStr || '', ns[0], ns[1], mm.home, mm.away);
          }
        }
        if (ns) scores[mm.id] = ns;
        // 检测刚进入中场：上一轮状态不是中场相关，这一轮 clockStr 是中场休息
        // 此时当前比分就是半场比分，立即记录
        if (st === 'LIVE' && clockStr === '中场休息' && !halftimeScores[mm.id]) {
          halftimeScores[mm.id] = ns ? [ns[0], ns[1]] : [0, 0];
        }
        matchStatus[mm.id] = st;
        if (htScores) halftimeScores[mm.id] = htScores;
        if (clockStr !== undefined) matchClock[mm.id] = clockStr;
      }
    }
  if (ns) saveScores();
  // 自动补填：ESPN 返回已结束比赛但缺预测 → 立即生成并锁定（解决公网新环境无 localStorage 问题）
  try {
    for (const ms of Object.values(GROUP_MATCHES)) {
      for (const m of ms) {
        if (predictions[m.id]?.locked) continue;  // 已锁定的不再变更
        if (predictions[m.id]) continue;
        if (matchStatus[m.id] === 'FINISHED' || (scores[m.id] && scores[m.id][0] !== null && matchClock[m.id] === '90′')) {
          predictions[m.id] = generateDailyPrediction(m);
        }
      }
    }
  } catch(e) { console.warn('[预测] 自动补填出错:', e); }
  // 同时检查是否命中淘汰赛对阵（赛后自动传播胜者）
  let koUpdated = false;
  for (const [sid, slot] of Object.entries(koSlot)) {
    if (slot.home === h && slot.away === a) {
      if (ns) { koScores[sid] = ns; propagateKnockout(); koUpdated = true; }
      break;
    }
  }
  if (koUpdated) updated = true;
  if (updated) { refreshAll(); }
}

// 有直播中的比赛时用 30s，否则 60s
function getPollingInterval() {
  // 有直播时10秒，无直播时30秒（用户无感体验）
  return Object.values(matchStatus).some(s => s === 'LIVE') ? 10000 : 30000;
}
function startPolling() {
  stopPolling();
  pollingTimer = setInterval(() => {
    fetchAllSources().then(() => {
      // 动态调整下一轮间隔（有直播变30s，无直播变60s）
      startPolling();
    });
  }, getPollingInterval());
}
function stopPolling() { if (pollingTimer) { clearInterval(pollingTimer); clearTimeout(pollingTimer); pollingTimer = null; } }
function updateStatus(state, msg) {
  const dot = document.getElementById('statusDot'), text = document.getElementById('statusText');
  dot.className = 'status-dot';
  switch(state) {
    case 'live': {
      dot.classList.add('live');
      const hasLive = Object.values(matchStatus).some(s => s === 'LIVE');
      text.textContent = hasLive ? 'Live · Refreshing every 30s' : 'Live · Refreshing every 60s';
      break;
    }
    case 'connecting': text.textContent = 'Connecting...'; break;
    case 'error': text.textContent = 'Connection failed: ' + (msg||''); break;
    default: text.textContent = '点击按钮连接实时数据';
  }
}

// ========== KNOCKOUT SYSTEM — 用户自定义对阵 ==========
// 上半区: QF_U1 + QF_U2 → SF_U
// 下半区: QF_L1 + QF_L2 → SF_L

const B32_DEF = [
  // ===== 上半区 QF_U1 =====
  {id:"R32_73",h:"1E",a:"3rd",q:"Q3"}, // E1 vs 3rd
  {id:"R32_79",h:"1I",a:"3rd",q:"Q2"}, // I1 vs 3rd
  {id:"R32_77",h:"2A",a:"2B", q:"Q1"}, // A2 vs B2
  {id:"R32_76",h:"1F",a:"2C", q:"Q3"}, // F1 vs C2
  // ===== 上半区 QF_U2 =====
  {id:"R32_80",h:"1D",a:"3rd",q:"Q2"}, // D1 vs 3rd
  {id:"R32_81",h:"1G",a:"3rd",q:"Q3"}, // G1 vs 3rd
  {id:"R32_83",h:"2K",a:"2L", q:"Q4"}, // K2 vs L2
  {id:"R32_84",h:"1H",a:"2J", q:"Q4"}, // H1 vs J2
  // ===== 下半区 QF_L1 =====
  {id:"R32_74",h:"1A",a:"3rd",q:"Q1"}, // A1 vs 3rd
  {id:"R32_82",h:"1L",a:"3rd",q:"Q4"}, // L1 vs 3rd
  {id:"R32_75",h:"1C",a:"2F", q:"Q1"}, // C1 vs F2
  {id:"R32_78",h:"2E",a:"2I", q:"X"},  // E2 vs I2
  // ===== 下半区 QF_L2 =====
  {id:"R32_87",h:"1B",a:"3rd",q:"Q1"}, // B1 vs 3rd
  {id:"R32_88",h:"1K",a:"3rd",q:"Q2"}, // K1 vs 3rd
  {id:"R32_86",h:"1J",a:"2H", q:"Q4"}, // J1 vs H2
  {id:"R32_85",h:"2D",a:"2G", q:"X"},  // D2 vs G2
];

// 晋级树: R32(16场) → R16(8场) → QF(4场) → SF(2场) → FINAL
const NEXT = {
  // QF_U1 路径
  R32_73:"R16_U1A",R32_79:"R16_U1A",
  R32_77:"R16_U1B",R32_76:"R16_U1B",
  R16_U1A:"QF_U1",R16_U1B:"QF_U1",
  // QF_U2 路径
  R32_80:"R16_U2A",R32_81:"R16_U2A",
  R32_83:"R16_U2B",R32_84:"R16_U2B",
  R16_U2A:"QF_U2",R16_U2B:"QF_U2",
  // QF_L1 路径
  R32_74:"R16_L1A",R32_82:"R16_L1A",
  R32_75:"R16_L1B",R32_78:"R16_L1B",
  R16_L1A:"QF_L1",R16_L1B:"QF_L1",
  // QF_L2 路径
  R32_87:"R16_L2A",R32_88:"R16_L2A",
  R32_86:"R16_L2B",R32_85:"R16_L2B",
  R16_L2A:"QF_L2",R16_L2B:"QF_L2",
  // QF → SF
  QF_U1:"SF_U",QF_U2:"SF_U",
  QF_L1:"SF_L",QF_L2:"SF_L",
  // SF → FINAL
  SF_U:"FINAL",SF_L:"FINAL",
};
// knockout scores: { "R32_1": [2,1], "R16_U1": [3,0], ... }
let koScores = {};
// knockout winners: { "R32_1": "加拿大", ... }
let koWinner = {};
// slot display data: { "R32_1": {home:"巴西", away:"德国"}, ... }
let koSlot = {};

// 计算晋级队伍: 返回 { "1A":"墨西哥", "2A":"南非", "3A":"韩国", ... }
function computeQualifiers() {
  const s = calcStandings();
  const map = {};
  for (const [g, rows] of Object.entries(s)) {
    map[`1${g}`] = rows[0].team;
    map[`2${g}`] = rows[1].team;
    map[`3${g}`] = rows[2].team;
  }
  // best 3rd ranks
  const thirds = calcBestThirds(s);
  const top8 = thirds.slice(0, 8).map(t => t.group);
  map._top8 = top8;
  return map;
}

// FIFA 第三名分配矩阵: 根据哪些组的第三名晋级，决定 1A~1H 各对哪个第三
// 默认邻组互换: 1A↔3C, 1B↔3D, 1C↔3A, 1D↔3B, 1E↔3F, 1F↔3E, 1G↔3H, 1H↔3G
// 备选表基于 FIFA 官方 56 种组合表的"相邻优先+跨区兜底"原则:
//   A-D 组(UPA半区)优先取 A-D 及相邻组，然后 E-H，最后 I-L
//   E-H 组(DOWN半区)优先取 E-H 及相邻组，然后 A-D，最后 I-L
// FIFA 第三名分配矩阵: 默认邻组互换
// 1A↔3C, 1B↔3D, 1C↔3A, 1D↔3B, 1E↔3F, 1F↔3E, 1G↔3H, 1H↔3G
// 唯一约束: 小组第一不碰自己组的第三（getThirdForWinner内处理）
const Q_ZONES = {
  Q1: ['A','B','C'], Q2: ['D','I','K'],
  Q3: ['E','F','G'], Q4: ['H','J','L'],
};
const THIRD_MATRIX = {
  A:{dflt:'C',fbs:['D','E','F','G','H','I','J','K','L','B']},
  B:{dflt:'D',fbs:['E','F','G','H','I','J','K','L','A','C']},
  C:{dflt:'A',fbs:['B','D','E','F','G','H','I','J','K','L']},
  D:{dflt:'B',fbs:['A','C','E','F','G','H','I','J','K','L']},
  E:{dflt:'F',fbs:['G','H','A','B','C','D','I','J','K','L']},
  F:{dflt:'E',fbs:['G','H','A','B','C','D','I','J','K','L']},
  G:{dflt:'H',fbs:['I','A','B','C','D','E','F','J','K','L']},
  H:{dflt:'G',fbs:['I','A','B','C','D','E','F','J','K','L']},
  I:{dflt:'J',fbs:['K','L','A','B','C','D','E','F','G','H']},
  J:{dflt:'I',fbs:['K','L','A','B','C','D','E','F','G','H']},
  K:{dflt:'L',fbs:['I','J','A','B','C','D','E','F','G','H']},
  L:{dflt:'K',fbs:['I','J','A','B','C','D','E','F','G','H']},
};
// 获取某小组第一应对的第三名小组字母
// 约束1: 不能碰自己小组的第三（1A不碰3A）
// 约束2: 不能碰同Q区的第三（Q1第一不碰Q1各组第三）
// 8支晋级第三抽签均分至4个Q区，每区2支外来第三名
function getThirdForWinner(wGroup, top8) {
  const m = THIRD_MATRIX[wGroup];
  if (!m) return top8[0];
  // 找出wGroup所在Q区，排除本区所有第三名
  let blocked = [];
  for (const [, groups] of Object.entries(Q_ZONES)) {
    if (groups.includes(wGroup)) { blocked = groups; break; }
  }
  // 1. 默认第三（邻组互换），但不碰本Q区
  if (top8.includes(m.dflt) && !blocked.includes(m.dflt)) return m.dflt;
  // 2. 按备选表找第一个晋级且不在本Q区内的
  for (const g of m.fbs) {
    if (top8.includes(g) && g !== wGroup && !blocked.includes(g)) return g;
  }
  // 3. 兜底: 取任意晋级第三(不同组且不同Q区)
  const fallback = top8.find(g => g !== wGroup && !blocked.includes(g));
  return fallback || top8[0];
}

function assignThirds(q, defs) {
  const top8 = q._top8; // 晋级的8个小组字母(已按排名排序)
  const used = [];
  const usedGroups = new Set();
  // 收集所有 WvT 槽位（共8个）
  const wvtSlots = defs.filter(d => d.h === '3rd' || d.a === '3rd');
  // 逐个分配：每槽找1个不在同Q区的外来第三名
  for (const d of wvtSlots) {
    if (usedGroups.size >= 8) break;
    const wGroup = d.h === '3rd' ? d.a[1] : d.h[1];
    const available = top8.filter(g => !usedGroups.has(g));
    if (available.length === 0) break;
    const thirdGroup = getThirdForWinner(wGroup, available);
    used.push({ group: thirdGroup, slotId: d.id });
    usedGroups.add(thirdGroup);
  }
  return used;
}

// 填充B32槽位（小组排名占位：A1=小组第1出线，B2=小组第2出线，3rd=最佳第3名）
function fillBracket() {
  koSlot = {};
  const fmt = s => s === '3rd' ? s : s[1] + s[0]; // "1E" → "E1"
  for (const d of B32_DEF) {
    koSlot[d.id] = { home: fmt(d.h), away: fmt(d.a) };
  }
  // 不传播晋级——等真实比分数据后再调用 propagateKnockout()
  if (currentTab === 'bracket') renderBracket();
}

// 爆冷标记：告诉我比赛ID（如 B_1），我帮你加/删
function toggleUpset(matchId) {
  const idx = upsetMatches.indexOf(matchId);
  if (idx >= 0) { upsetMatches.splice(idx, 1); }
  else { upsetMatches.push(matchId); }
  renderMatches();
  console.log('爆冷列表:', upsetMatches);
}

// 决定淘汰赛胜者
function getKoWinner(slotId) {
  const s = koScores[slotId];
  if (!s || s[0] === null || s[1] === null) return null;
  return s[0] > s[1] ? koSlot[slotId]?.home :
         s[1] > s[0] ? koSlot[slotId]?.away : null; // 平局等点球，暂null
}

// 向下传播胜者
function propagateKnockout() {
  const entries = Object.entries(NEXT);
  for (const [from, to] of entries) {
    const w = getKoWinner(from);
    if (!w) continue;
    if (!koSlot[to]) koSlot[to] = {};
    const siblings = entries.filter(([,t]) => t === to);
    const myIdx = siblings.findIndex(([f]) => f === from);
    if (myIdx === 0 || !koSlot[to].home) koSlot[to].home = w;
    else koSlot[to].away = w;
  }
  // SF losers → 季军赛
  const sfLosers = {};
  for (const sfId of ['SF_U', 'SF_L']) {
    const s = koScores[sfId];
    const slot = koSlot[sfId];
    if (!s || s[0]===null || !slot) continue;
    if (s[0] < s[1]) sfLosers[sfId] = slot.home;
    else if (s[1] < s[0]) sfLosers[sfId] = slot.away;
  }
  if (sfLosers.SF_U || sfLosers.SF_L) {
    koSlot['THIRD'] = koSlot['THIRD'] || {};
    if (sfLosers.SF_U) koSlot['THIRD'].home = sfLosers.SF_U;
    if (sfLosers.SF_L) koSlot['THIRD'].away = sfLosers.SF_L;
  }
}

// ========== STANDINGS ==========
// FIFA 2026 小组排名 tiebreak 完整链:
// 1.积分 2.净胜球 3.进球 4.相互战绩(积分→净胜→进球) 5.公平竞赛 6.抽签
// 公平竞赛积分: 黄牌-1, 间接红牌(两黄)-3, 直接红牌-4, 黄牌+直接红牌-5
// 积分越低越好(越干净)

// 公平竞赛数据 (初始为0，可通过API或手动更新)
let fairPlay = {}; // {teamName: 负分 }

function h2hCompare(teamA, teamB, groupMatches, scores) {
  // 只计算两队之间的比赛
  const gm = groupMatches.filter(m =>
    (m.home === teamA && m.away === teamB) || (m.home === teamB && m.away === teamA)
  );
  if (gm.length === 0) return 0;
  const h2h = { [teamA]: { pts: 0, gf: 0, ga: 0 }, [teamB]: { pts: 0, gf: 0, ga: 0 } };
  for (const m of gm) {
    const s = scores[m.id];
    if (!s || s[0] === null) return 0;
    if (m.home === teamA) {
      h2h[teamA].gf += s[0]; h2h[teamB].gf += s[1];
      h2h[teamA].ga += s[1]; h2h[teamB].ga += s[0];
    } else {
      h2h[teamB].gf += s[0]; h2h[teamA].gf += s[1];
      h2h[teamB].ga += s[1]; h2h[teamA].ga += s[0];
    }
    if (s[0] > s[1]) {
      const w = m.home === teamA ? teamA : teamB;
      h2h[w].pts += 3;
    } else if (s[0] < s[1]) {
      const w = m.home === teamA ? teamB : teamA;
      h2h[w].pts += 3;
    } else { h2h[teamA].pts++; h2h[teamB].pts++; }
  }
  const a = h2h[teamA], b = h2h[teamB];
  return b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf || 0;
}

function fairPlayCompare(teamA, teamB) {
  const fpA = fairPlay[teamA] || 0, fpB = fairPlay[teamB] || 0;
  return fpA - fpB; // 负分越大(扣分多)排在后面，即 fp值小的排在前面
}

function calcStandings() {
  const standings = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    const rec = {};
    for (const t of teams) rec[t] = { team: t, pts: 0, mp: 0, gf: 0, ga: 0, gd: 0, w: 0, d: 0, l: 0 };
    for (const m of GROUP_MATCHES[g]) {
      const s = scores[m.id];
      if (s && s[0] !== null && s[1] !== null) {
        const h = m.home, a = m.away;
        rec[h].mp++; rec[a].mp++; rec[h].gf += s[0]; rec[a].gf += s[1];
        rec[h].ga += s[1]; rec[a].ga += s[0];
        if (s[0] > s[1]) { rec[h].pts += 3; rec[h].w++; rec[a].l++; }
        else if (s[0] < s[1]) { rec[a].pts += 3; rec[a].w++; rec[h].l++; }
        else { rec[h].pts++; rec[a].pts++; rec[h].d++; rec[a].d++; }
      }
    }
    for (const t of teams) rec[t].gd = rec[t].gf - rec[t].ga;
    // 完整 tiebreak 排序
    standings[g] = Object.values(rec).sort((a, b) =>
      b.pts - a.pts ||                    // 1. 积分
      b.gd - a.gd ||                      // 2. 净胜球
      b.gf - a.gf ||                      // 3. 进球
      h2hCompare(a.team, b.team, GROUP_MATCHES[g], scores) || // 4. 相互战绩
      fairPlayCompare(a.team, b.team) ||  // 5. 公平竞赛
      Math.random() - 0.5                 // 6. 抽签(简化)
    );
  }
  return standings;
}

// 跨组最佳第三排名 tiebreak: 1.积分 2.净胜球 3.进球 4.公平竞赛 5.抽签（无相互战绩）
function calcBestThirds(s) {
  const t = [];
  for (const [g, r] of Object.entries(s)) t.push({ ...r[2], group: g });
  t.sort((a, b) =>
    b.pts - a.pts ||                // 1. 积分
    b.gd - a.gd ||                  // 2. 净胜球
    b.gf - a.gf ||                  // 3. 进球
    ((fairPlay[a.team] || 0) - (fairPlay[b.team] || 0)) || // 4. 公平竞赛
    Math.random() - 0.5             // 5. 抽签(简化)
  );
  return t;
}

// ========== 比分预测引擎 ==========
function getTomorrowStr() {
  const t = new Date(); t.setDate(t.getDate() + 1);
  return `${t.getMonth() + 1}月${t.getDate()}日`;
}

function generateDailyPrediction(m) {
  // 复用 predictMatch 模型（不传赔率，纯粹基于球队数据）
  const result = predictMatch(m, null);
  result.predictedAt = new Date().toISOString();
  result.locked = true;
  return result;
}

function checkAndPredict() {
  try {
    const tomorrowStr = getTomorrowStr();
    console.log('[预测] 检查明天比赛:', tomorrowStr);
    let updated = false;
    let candidateCount = 0, backfillCount = 0;
    for (const ms of Object.values(GROUP_MATCHES)) {
      for (const m of ms) {
        // 已锁定的预测不再变更（已完赛/已锁定）
        if (predictions[m.id]?.locked) continue;
        // 回填：已结束且有比分但缺预测 → 补生成并锁定
        if (matchStatus[m.id] === 'FINISHED' && scores[m.id] && scores[m.id][0] !== null) {
          predictions[m.id] = generateDailyPrediction(m);
          console.log('[预测] 回填已结束:', m.id, predictions[m.id].score);
          backfillCount++;
          updated = true;
          continue;
        }
        // 常规：明天比赛预测
        if (m.date !== tomorrowStr) continue;
        candidateCount++;
        if (matchStatus[m.id] === 'FINISHED') continue;
        predictions[m.id] = generateDailyPrediction(m);
        console.log('[预测] 已生成:', m.id, predictions[m.id].score, predictions[m.id].wdl);
        updated = true;
      }
    }
    console.log('[预测] 候选:', candidateCount, '回填:', backfillCount, '更新:', updated);
    if (updated) {
      saveScores();
      console.log('[预测] 已保存到 localStorage');
      return true;
    }
  } catch(e) {
    console.error('[预测] 出错:', e);
  }
  return false;
}

}

          if (!events.length) return '';
          const typeLabel = t => t === 'penalty_scored' ? '点球' : t === 'own_goal' ? '乌龙' : '';
          return `<div style="margin-top:8px">
            <div style="font-size:11px;color:var(--text);font-weight:bold;margin-bottom:6px">进球事件</div>
            <div style="font-size:12px;color:var(--text)">
              ${events.map(ev => `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--border)">
                <span style="min-width:48px;font-weight:bold;color:${ev.team === m.home ? 'var(--home)' : 'var(--away)'}">${ev.team}</span>
                <span style="min-width:28px;text-align:center;color:var(--gold);font-weight:bold">${ev.minute}'</span>
                <span style="min-width:32px;font-size:11px;color:var(--muted)">${typeLabel(ev.type)}</span>
              </div>`).join('')}
            </div>
          </div>`;
        })())}
      </div>`:''}
    </div>
  </div>` : `
  <div class="modal-section">
    <h4>📊 AI 比赛预测</h4>
    <div class="prediction-box" style="text-align:center;color:var(--muted);font-size:13px;padding:16px">
      预测将在比赛前一天 0 点发布，届时锁定不可更改
    </div>
  </div>`}`;

  document.getElementById('modalPanel').innerHTML=htm;
  document.getElementById('matchModal').style.display='flex';
}

function closeModal(){
  document.getElementById('matchModal').style.display='none';
}

// ========== PREDICTION ENGINE v2 — 赔率驱动 + 强弱自适应 ==========
function predictMatch(m, oddsData){
  const td=TEAM_DATA;
  const h=td[m.home]||{value:"1亿欧",rank:50,players:[],suspended:[],missing:[]};
  const a=td[m.away]||{value:"1亿欧",rank:50,players:[],suspended:[],missing:[]};

  // 解析身价数值（兼容"15.3亿欧"/"4580万欧"等格式）
  const parseVal=v=>{
    if(typeof v!=='string')return 1;
    if(v.includes('亿'))return parseFloat(v)*100;
    if(v.includes('万'))return parseFloat(v)/100;
    return parseFloat(v)||1;
  };
  const hv=parseVal(h.value), av=parseVal(a.value);
  const hr=h.rank||50, ar=a.rank||50;

  // ========== 1. 身价指数（对数压缩差距） ==========
  const vi=Math.log2(hv+0.5)-Math.log2(av+0.5);
  // ========== 2. 排名指数 ==========
  const ri=(ar-hr)*0.015;
  // ========== 3. 打法风格 ==========
  const hs=STYLE_DATA[m.home]||{style:"整体压迫",attack:5.5,defense:5.5,tempo:"中",desc:"均衡型"};
  const as=STYLE_DATA[m.away]||{style:"整体压迫",attack:5.5,defense:5.5,tempo:"中",desc:"均衡型"};
  const styleBonus=styleMatchup(hs.style, as.style);
  const totalAtk=(hs.attack+as.attack)/20;
  const totalDef=(hs.defense+as.defense)/20;
  // ========== 4. 战意 ==========
  function getMotivation(mid){
    const parts=mid.split(/[_-]/);
    if(/^[A-L]$/.test(parts[0])){
      const round=parseInt(parts[1])||0;
      if(round>=4) return 1.20;
      if(round>=2) return 1.08;
      return 1.00;
    }
    if(/r32/.test(mid)) return 1.25;
    if(/r16/.test(mid)) return 1.30;
    if(/qf/.test(mid)) return 1.35;
    if(/sf/.test(mid)) return 1.40;
    if(/final/.test(mid)) return 1.45;
    return 1.10;
  }
  const motivation=getMotivation(m.id);
  // ========== 5. 伤缺 & 6. 停赛 ==========
  const hInj=getTeamInjuries(m.home), aInj=getTeamInjuries(m.away);
  const hSus=(h.suspended||[]).length, aSus=(a.suspended||[]).length;
  const hAbsent=hInj.length*0.08+hSus*0.12, aAbsent=aInj.length*0.08+aSus*0.12;

  // ========== 核心七维优势 ==========
  let adv=vi*0.18+ri*0.10+styleBonus*0.08+(motivation-1)*0.6*0.08-(aAbsent-hAbsent)*0.50;
  let goalBase=2.5+(totalAtk-totalDef)*0.8;

  // ========== ESPN 赔率驱动（最高优先级） ==========
  let oddsInfo=null;
  let espnOdds = espnOddsCache[m.home + '_' + m.away] || null;
  // 如果没从缓存找到，检查反向（ESPN可能客队在前）
  if (!espnOdds) espnOdds = espnOddsCache[m.away + '_' + m.home] || null;

  // 美式赔率 → 欧洲小数赔率
  function mlToDecimal(ml) {
    ml = String(ml);
    if (ml.startsWith('+')) return 1 + parseFloat(ml.slice(1)) / 100;
    if (ml.startsWith('-')) return 1 + 100 / Math.abs(parseFloat(ml));
    const n = parseFloat(ml);
    return n >= 1 ? n : 0;
  }
  // 美式赔率 → 隐含概率
  function mlToProb(ml) {
    const d = mlToDecimal(ml);
    return d > 1 ? 1 / d : 0;
  }

  if (espnOdds && espnOdds.mlHome && espnOdds.mlAway) {
    const hDec = mlToDecimal(espnOdds.mlHome);
    const aDec = mlToDecimal(espnOdds.mlAway);
    const dDec = espnOdds.mlDraw ? mlToDecimal(espnOdds.mlDraw) : 0;
    const hProb = mlToProb(espnOdds.mlHome);
    const aProb = mlToProb(espnOdds.mlAway);
    const dProb = dDec > 1 ? 1 / dDec : 0;
    const totalProb = hProb + aProb + dProb;
    // 归一化概率（去除抽水）
    const hImp = totalProb > 0 ? hProb / totalProb : 0.33;
    const dImp = totalProb > 0 ? dProb / totalProb : 0.33;
    const aImp = totalProb > 0 ? aProb / totalProb : 0.33;
    // 赔率优势：正数=主队有利，负数=客队有利
    const oddsAdv = (hImp - aImp) * 3.5;
    // 亚盘让球（DraftKings spread：负=主让，正=客让）
    const spread = parseFloat(espnOdds.spread) || 0;
    // 大小球
    if (espnOdds.ou > 0) goalBase = espnOdds.ou;

    // 赔率融合：ESPN赔率50% + 七维模型30% + 亚盘spread 20%
    adv = oddsAdv * 0.50 + adv * 0.30 + spread * 0.20;

    oddsInfo = {
      euro: `欧盘 ${hDec.toFixed(2)}/${dDec.toFixed(2)}/${aDec.toFixed(2)}`,
      asian: `亚盘 ${spread > 0 ? '+' : ''}${spread}`,
      ou: `大小球 ${goalBase}`,
      implied: `${Math.round(hImp * 100)}%/${Math.round(dImp * 100)}%/${Math.round(aImp * 100)}%`,
      ml: `美赔 H=${espnOdds.mlHome} D=${espnOdds.mlDraw || '--'} A=${espnOdds.mlAway}`,
    };
  } else if (oddsData && oddsData.euro) {
    // fallback: API-Football 赔率（如果配置了 API Key）
    const o = oddsData.euro;
    const hP = 1/o.Home, dP = 1/o.Draw, aP = 1/o.Away;
    const totalP = hP + dP + aP;
    const hImpl = hP / totalP, dImpl = dP / totalP, aImpl = aP / totalP;
    const oddsAdv = (hImpl - aImpl) * 3.5;
    const asianLine = oddsData.asian ? oddsData.asian.line : 0;
    if (oddsData.overUnder) goalBase = oddsData.overUnder;
    adv = oddsAdv * 0.35 + asianLine * 0.12 + adv * 0.53;
    oddsInfo = {
      euro: `欧盘 ${o.Home}/${o.Draw}/${o.Away}`,
      asian: oddsData.asian ? `亚盘 ${asianLine > 0 ? '+' : ''}${asianLine}` : '亚盘 --',
      ou: oddsData.overUnder ? `大小球 ${goalBase}` : '大小球 --',
      implied: `${Math.round(hImpl * 100)}%/${Math.round(dImpl * 100)}%/${Math.round(aImpl * 100)}%`
    };
  }

  // 战意微调大小球
  if (motivation > 1.15) goalBase = goalBase * 0.95 + (motivation - 1) * 1.2;

  // ========== 种子随机 ==========
  const seed = hashCode(m.id);
  const rng = (s) => { let x = Math.sin(s * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); };

  // ========== 强弱判断 & 激进/保守策略 ==========
  const absAdv = Math.abs(adv);
  // 体力悬殊阈值：absAdv > 0.8 为明显强弱差距
  const isBlowout = absAdv > 0.8;
  const isEven = absAdv <= 0.4;  // 势均力敌

  // ========== 进球期望（赔率驱动 + 强弱自适应）==========
  const base = goalBase / 2;
  // 强队进球期望
  const strongExp = base * (1 + Math.min(absAdv, 2.5) * 1.2);
  // 弱队进球期望
  const weakExp = Math.max(0.15, base * (1 - Math.min(absAdv, 2.0) * 0.8));

  const hExp = adv >= 0 ? strongExp : weakExp;
  const aExp = adv >= 0 ? weakExp : strongExp;

  // 噪声控制：
  // 强弱悬殊 → 噪声小（结果可预测），但强队进球可激进
  // 势均力敌 → 噪声大（不确定性高），比分保守
  let noiseScale;
  if (isBlowout) {
    // 强队打弱队：激进，但分差稳定（弱队难进球）
    noiseScale = 1.2 / (1 + absAdv * 1.5);
  } else if (isEven) {
    // 势均力敌：保守，小比分为主
    noiseScale = 1.0;  // 不额外抑制，但期望值已经很低
  } else {
    noiseScale = 1.5 / (1 + absAdv * 1.0);
  }

  // ========== 场景一：实力碾压（赔率驱动主力比分）==========
  function genBlowout(seedOff) {
    const r1 = rng(seed + seedOff), r2 = rng(seed + seedOff + 17);
    const isStronger = adv >= 0;
    // 强队方噪声小，弱队方额外限制
    const sNoise = noiseScale;
    const wNoise = Math.max(0.2, noiseScale * 0.4); // 弱队进球波动极小
    const hNoise = isStronger ? sNoise : wNoise;
    const aNoise = isStronger ? wNoise : sNoise;
    let hg = Math.round(hExp + (r1 - 0.5) * hNoise + (r2 - 0.5) * hNoise * 0.5);
    let ag = Math.round(aExp + (r2 - 0.5) * aNoise + (r1 - 0.5) * aNoise * 0.5);
    // 强队打弱队激进：强队保底2球，弱队上限1球
    if (isBlowout) {
      if (isStronger) { hg = Math.max(2, hg); ag = Math.min(1, ag); }
      else { ag = Math.max(2, ag); hg = Math.min(1, hg); }
    }
    hg = Math.max(0, Math.min(hg, 9));
    ag = Math.max(0, Math.min(ag, 9));
    return { hg, ag };
  }

  // ========== 场景二：意外胶着（弱队超水平，强队失常）==========
  function genTight(seedOff) {
    const r1 = rng(seed + seedOff), r2 = rng(seed + seedOff + 23);
    const isStronger = adv >= 0;
    // 势均力敌时两个场景都保守
    if (isEven) {
      // 胶着场景：1-1, 0-1, 1-0, 0-0 类型
      const tExp = base * 0.9;
      let hg = Math.round(tExp + (r1 - 0.5) * 0.8);
      let ag = Math.round(tExp + (r2 - 0.5) * 0.8);
      hg = Math.max(0, Math.min(hg, 2));
      ag = Math.max(0, Math.min(ag, 2));
      return { hg, ag };
    }
    const boostWeak = Math.max(0.4, weakExp * (1 + absAdv * 1.2));
    const dampStrong = strongExp * (1 - absAdv * 0.2);
    const tHExp = isStronger ? dampStrong : boostWeak;
    const tAExp = isStronger ? boostWeak : dampStrong;
    const tNoise = noiseScale * 1.3;
    const tWeakMin = Math.min(tHExp, tAExp);
    const tWeakNoise = tWeakMin < 0.5 ? tNoise * 0.3 : tNoise;
    const hNoise = isStronger ? tNoise : tWeakNoise;
    const aNoise = isStronger ? tWeakNoise : tNoise;
    let hg = Math.round(tHExp + (r1 - 0.5) * hNoise + (r2 - 0.5) * hNoise * 0.5);
    let ag = Math.round(tAExp + (r2 - 0.5) * aNoise + (r1 - 0.5) * aNoise * 0.5);
    hg = Math.max(0, Math.min(hg, 5));
    ag = Math.max(0, Math.min(ag, 5));
    return { hg, ag };
  }

  const s1 = genBlowout(0);
  const s2 = genTight(300);
  let scoreA = `${s1.hg}-${s1.ag}`;
  let scoreB = `${s2.hg}-${s2.ag}`;
  if (scoreA === scoreB) {
    if (s2.ag > 0) s2.ag--; else s2.ag++;
    scoreB = `${s2.hg}-${s2.ag}`;
  }

  // ========== 爆冷/胶着判断 ==========
  const upsetProb = 0.08 + Math.exp(-absAdv * 3.2) * 0.30;
  const upsetPct = Math.round(upsetProb * 100);
  const s1Winner = s1.hg > s1.ag ? 'H' : s1.hg < s1.ag ? 'A' : 'D';
  const s2Winner = s2.hg > s2.ag ? 'H' : s2.hg < s2.ag ? 'A' : 'D';
  const strongerIsHome = adv >= 0;
  const isUpset =
    (strongerIsHome && (s2Winner === 'A' || (s1Winner === 'H' && s2Winner === 'D'))) ||
    (!strongerIsHome && (s2Winner === 'H' || (s1Winner === 'A' && s2Winner === 'D')));

  // ========== 赛果 ==========
  const hg = s1.hg, ag = s1.ag;
  let wdl = '', wdlLabel = '';
  if (hg > ag) { wdl = '主胜'; wdlLabel = `${m.home}·胜`; }
  else if (hg < ag) { wdl = '客胜'; wdlLabel = `${m.away}·胜`; }
  else { wdl = '平局'; wdlLabel = '平局'; }

  // 胶着场景说明
  let tightNote = '';
  if (isUpset) {
    const upWinnerLabel = s2.hg > s2.ag ? tname(m.home) : s2.hg < s2.ag ? tname(m.away) : '';
    if (s2.hg === s2.ag) tightNote = '强队若失常可能出平局';
    else tightNote = `若${upWinnerLabel}超水平发挥可能爆冷`;
  } else if (absAdv > 1.0) {
    const gap = Math.round(s1.hg + s1.ag - s2.hg - s2.ag);
    tightNote = `弱队若死守，分差可能缩小至${gap}球`;
  } else {
    tightNote = '若弱队战术执行到位，可能咬住比分';
  }

  const totalG = hg + ag;
  let gDesc = totalG <= 1 ? '极低进球' : totalG <= 3 ? '中等进球' : totalG <= 5 ? '高进球' : '进球大战';

  // ========== 结构化分析（七维因素 + 赔率） ==========
  let reasons = [];
  const strongName = adv >= 0 ? tname(m.home) : tname(m.away);
  const weakName = adv >= 0 ? tname(m.away) : tname(m.home);
  const strongVal = adv >= 0 ? h.value : a.value;
  const weakVal = adv >= 0 ? a.value : h.value;
  const strongRank = adv >= 0 ? hr : ar;
  const weakRank = adv >= 0 ? ar : hr;

  if (absAdv > 1.2) {
    reasons.push(`【实力】${strongName}全面占优（身价${strongVal} vs ${weakVal}，FIFA#${strongRank} vs #${weakRank}）`);
  } else if (absAdv > 0.5) {
    reasons.push(`【实力】${strongName}略占上风（身价${strongVal} vs ${weakVal}，排名#${strongRank} vs #${weakRank}）`);
  } else {
    reasons.push(`【实力】双方接近（身价${h.value} vs ${a.value}，排名#${Math.min(hr, ar)} vs #${Math.max(hr, ar)}）`);
  }

  reasons.push(`【打法】${tname(m.home)}(${hs.style}·${hs.desc}) vs ${tname(m.away)}(${as.style}·${as.desc})`);
  if (styleBonus > 0.15) reasons.push(`${tname(m.home)}打法克制${tname(m.away)}`);
  else if (styleBonus < -0.15) reasons.push(`${tname(m.away)}打法克制${tname(m.home)}`);

  if (motivation >= 1.20) reasons.push(`【战意】淘汰赛阶段，双方战意拉满`);
  else if (motivation >= 1.08) reasons.push(`【战意】小组关键战，战意较高`);

  const susParts = [];
  if (hInj.length) susParts.push(`${tname(m.home)}伤${hInj.length}人`);
  if (aInj.length) susParts.push(`${tname(m.away)}伤${aInj.length}人`);
  if (hSus) susParts.push(`${tname(m.home)}停${hSus}人`);
  if (aSus) susParts.push(`${tname(m.away)}停${aSus}人`);
  if (susParts.length) {
    reasons.push(`【伤停】${susParts.join('，')}${(hAbsent + aAbsent) >= 0.3 ? '（影响较大）' : ''}`);
  } else {
    reasons.push(`【伤停】双方阵容完整，无明显伤停影响`);
  }

  // 赔率信息
  if (oddsInfo) {
    reasons.push(`【盘口】${oddsInfo.asian.replace('亚盘 ', '')} | ${oddsInfo.ou.replace('大小球 ', '')} | 市场${oddsInfo.implied}`);
    if (oddsInfo.ml) reasons.push(`【赔率】${oddsInfo.ml}`);
  }

  // 强弱策略说明
  if (isBlowout) {
    reasons.push(`【策略】${strongName}对${weakName}实力悬殊，预测比分偏激进`);
  } else if (isEven) {
    reasons.push(`【策略】双方实力接近，预测比分偏保守（小比分为主）`);
  }

  // 进球预期 & 场景
  const predTotal = Math.round((hExp + aExp) * 1.05);
  reasons.push(`【预期】进球约${predTotal}球（市场${goalBase}），${gDesc}节奏`);
  reasons.push(`【比分】①主力预测 ${scoreA}；②胶着备选 ${scoreB}（${tightNote}）`);

  if (upsetPct >= 25) reasons.push(`【冷门】概率${upsetPct}%，建议谨慎对待`);
  else if (upsetPct >= 15) reasons.push(`【冷门】存在${upsetPct}%可能，不排除意外`);

  return {
    score: scoreA,
    scoreB: scoreB,
    wdl, wdlLabel,
    goals: totalG + `球 (${gDesc})`,
    goalsNum: totalG,
    reason: reasons.join('；'),
    isUpset,
    oddsInfo
  };
}

  // ===== CENTER: Finals =====
  const finalData=koSlot['FINAL']||{};
  const thirdData=koSlot['THIRD']||{};
  html+=`<div class="finals-center">
    <div class="final-box${thirdData.home?' filled':''}">

      <div class="f-title">决赛</div>
      <div class="bslot${finalData.home?' filled':''}">${finalData.home?'<span class="slot-row">'+flagImg(finalData.home,15)+' <span class="team">'+tname(finalData.home)+'</span></span>':'<span class="desc">TBD</span>'}</div>
      <div class="bslot${finalData.away?' filled':''}">${finalData.away?'<span class="slot-row">'+flagImg(finalData.away,15)+' <span class="team">'+tname(finalData.away)+'</span></span>':'<span class="desc">TBD</span>'}</div>
    </div>
  </div>`;

  // ===== RIGHT: 下半区 =====
  html+=`<div class="bracket-half lower">
    <div class="sub-block sub-q3">
      <div class="sub-block-header">下半区 1/4</div>
      <div class="rounds-row row-q3">
        <div class="r-col slots">${buildRoundSlots([{id:'QF_L1'}],'qf','down')}</div>
        <div class="r-col slots">${buildRoundSlots([{id:'R16_L1A'},{id:'R16_L1B'}],'r16','down')}</div>
        <div class="r-col slots">${buildRoundSlots([{id:'R32_74'},{id:'R32_82'},{id:'R32_75'},{id:'R32_78'}],'r32','down')}</div>
      </div>
    </div>
    <div class="sub-block sub-q4">
      <div class="sub-block-header">下半区 2/4</div>
      <div class="rounds-row row-q4">
        <div class="r-col slots">${buildRoundSlots([{id:'QF_L2'}],'qf','down')}</div>
        <div class="r-col slots">${buildRoundSlots([{id:'R16_L2A'},{id:'R16_L2B'}],'r16','down')}</div>
        <div class="r-col slots">${buildRoundSlots([{id:'R32_87'},{id:'R32_88'},{id:'R32_86'},{id:'R32_85'}],'r32','down')}</div>
      </div>
    </div>
    ${(()=>{const s=buildSfSlot('SF_L');return s?`<div class="sf-merge-row"><div class="r-col slots">${s}</div></div>`:'';})()}
  </div>`;

  html+='</div></div></div>';
  cont.innerHTML=html;
  bracketReset();
  setupBracketPan();
}

function buildSfSlot(slotId){
  const data=koSlot[slotId];
  if(!data||!data.home) return '';
  let html='';
  html+=`<div class="bslot filled"><span class="slot-row">${flagImg(data.home,15)}<span class="team">${tname(data.home)}</span></span></div>`;
  html+=data.away
    ?`<div class="bslot filled"><span class="slot-row">${flagImg(data.away,15)}<span class="team">${tname(data.away)}</span></span></div>`
    :'';
  return html;
}

function buildRoundSlots(slots, round, half){
  let html='';
  const ROUND_LABELS = {r32:'32强', r16:'16强', qf:'8强', sf:'4强'};
  slots.forEach((s,i)=>{
    let slotId;
    if(round==='r32'){
      slotId=s.id;
    }else if(s && typeof s==='object' && s.id){
      slotId=s.id;
    }else{
      const h=half==='up'?'U':'L';
      const seq=typeof s==='number'?s:i;
      const prefix=round==='r16'?'R16':round==='qf'?'QF':round==='sf'?'SF':'';
      slotId=`${prefix}_${h}${seq}`;
    }
    const data=koSlot[slotId];
    if(data&&data.home){
      html+=`<div class="bslot filled"><span class="slot-row">${flagImg(data.home,15)}<span class="team">${tname(data.home)}</span></span></div>`;
      html+=data.away
        ?`<div class="bslot filled"><span class="slot-row">${flagImg(data.away,15)}<span class="team">${tname(data.away)}</span></span></div>`
        :`<div class="bslot"></div>`;
    }else{
      html+=`<div class="bslot"><span class="desc">-</span></div>`;
      html+=`<div class="bslot"><span class="desc">-</span></div>`;
    }
  });
  return html;
}

// ========== BRACKET ZOOM & PAN ==========
let bScale=1, bPanX=0, bPanY=0;
let isPanning=false, panStartX=0, panStartY=0, panOrigX=0, panOrigY=0;

function applyTransform(){
  const el=document.getElementById('bracketCanvas');
  if(!el) return;
  el.style.transform=`translate(${bPanX}px,${bPanY}px) scale(${bScale})`;
  document.getElementById('zoomLabel').textContent=Math.round(bScale*100)+'%';
}
function bracketZoom(delta){
  const vp=document.getElementById('bracketViewport');
  if(!vp) return;
  const r=vp.getBoundingClientRect();
  const cx=r.width/2, cy=r.height/2;
  // scale around viewport center
  const newScale=Math.max(0.3,Math.min(3,bScale+delta));
  const ratio=newScale/bScale;
  bPanX=cx-(cx-bPanX)*ratio;
  bPanY=cy-(cy-bPanY)*ratio;
  bScale=newScale;
  applyTransform();
}
function bracketReset(){
  // 先重置到 1:1 让浏览器计算出自然尺寸
  bScale=1; bPanX=0; bPanY=0;
  applyTransform();
  setTimeout(()=>{
    const vp=document.getElementById('bracketViewport');
    const bc=document.getElementById('bracketCanvas');
    if(!vp||!bc) return;
    const vr=vp.getBoundingClientRect();
    const br=bc.getBoundingClientRect();
    if(br.width===0||br.height===0) { bracketReset(); return; }
    // 自适应缩放：完整对阵图刚好铺满视口，留 30px 边距
    const pad=30;
    const scaleX=(vr.width-pad*2)/br.width;
    const scaleY=(vr.height-pad*2)/br.height;
    bScale=Math.max(0.25, Math.min(scaleX, scaleY, 1.5));
    // 居中
    bPanX=(vr.width-br.width*bScale)/2;
    bPanY=(vr.height-br.height*bScale)/2;
    applyTransform();
  },150);
}
function setupBracketPan(){
  const vp=document.getElementById('bracketViewport');
  if(!vp) return;
  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    bracketZoom(e.deltaY>0?-0.1:0.1);
  },{passive:false});
  vp.addEventListener('mousedown',e=>{
    isPanning=true; panStartX=e.clientX; panStartY=e.clientY;
    panOrigX=bPanX; panOrigY=bPanY;
    vp.classList.add('grabbing');
  });
  window.addEventListener('mousemove',e=>{
    if(!isPanning) return;
    bPanX=panOrigX+(e.clientX-panStartX);
    bPanY=panOrigY+(e.clientY-panStartY);
    applyTransform();
  });
  window.addEventListener('mouseup',()=>{
    if(isPanning){ isPanning=false; document.getElementById('bracketViewport')?.classList.remove('grabbing'); }
  });
}

// ========== RENDER: BEST 3RD ==========
function renderBest3rd(){
  const standings=calcStandings();
  const thirds=calcBestThirds(standings);
  const cont=document.getElementById('tab-best3rd');
  let html='<div style="max-width:800px;margin:0 auto"><h3 style="margin-bottom:8px">Best Third-Placed Teams (Top 8 advance to Knockout Stage)</h3>';
  html+='<table class="best3rd-table"><tr><th>Rank</th><th>Group</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Status</th></tr>';
  thirds.forEach((t,i)=>{
    const cls=i<8?'qualify':'miss';
    html+=`<tr class="${cls}"><td>${i+1}</td><td>${t.group}</td>
      <td>${flagImg(t.team)} ${tname(t.team)}</td>
      <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>=0?'+':''}${t.gd}</td>
      <td><b>${t.pts}</b></td><td>${i<8?'Qualified':'Eliminated'}</td></tr>`;
  });
  html+='</table></div>'; cont.innerHTML=html;
}

function refreshAll(){renderStandings();renderMatches();renderBest3rd();if(currentTab==='bracket')renderBracket();checkGroupComplete();}

// ========== TABS ==========
let currentTab='groups';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display=tab==='bracket'?'flex':'block';
  event.target.classList.add('active');
  if(tab==='bracket') renderBracket();
  if(tab==='best3rd') renderBest3rd();
}

try {
  renderStandings(); renderMatches(); renderBest3rd();

  connectAll();
} catch(e) {

  document.body.innerHTML += '<div style="color:red;padding:20px">初始化错误: '+e.message+'<br>请按F12查看控制台</div>';
}

window.addEventListener('error', function(e) {

});
window.addEventListener('unhandledrejection', function(e) {

});
