<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 United States, Canada, Mexic</title>
<style>
:root {
  --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9;
  --muted:#8b949e; --gold:#f0c040; --green:#3fb950; --red:#f85149;
  --blue:#58a6ff; --accent:#d2a8ff; --up:#2ea043; --down:#1f6feb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:16px}
h1{text-align:center;font-size:26px;margin-bottom:4px}
#yearBadge{font-weight:bold;transition:.3s;color:#2ea04f} /* green */
#yearBadge.connected{color:#2ea04f}
h1 .sub{text-align:center;color:var(--gold);font-size:14px;margin-bottom:12px}

/* tabs */
.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;
  background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
.tab-btn:hover,.tab-btn.active{border-color:var(--gold);color:var(--gold)}

/* groups grid */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:12px;margin-bottom:20px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.group-header{padding:8px 14px;font-weight:bold;font-size:15px;border-bottom:1px solid var(--border);
  background:#1a1f2b;display:flex;justify-content:space-between;align-items:center}
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{background:#1a1f2b;padding:6px 8px;text-align:center;color:var(--muted);font-weight:normal;font-size:11px;border-bottom:1px solid var(--border)}
.standings-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(48,54,61,.5)}
.standings-table .team-name{text-align:left;font-weight:bold}
.standings-table .flag{font-size:16px;margin-right:4px;vertical-align:-2px}
.standings-table tr.top2 td{background:rgba(63,185,80,.08)}
.standings-table tr.third td{background:rgba(210,168,255,.06)}
.standings-table tr.elim td{opacity:.45}
.rank-dot{font-weight:bold;font-size:12px}
.pos-1{color:var(--gold)} .pos-2{color:var(--green)} .pos-3{color:var(--accent)} .pos-4{color:var(--muted)}

/* match rows */
/* ========== MATCH CARDS GRID ========== */
#tab-matches{padding:12px;overflow-y:auto;height:calc(100vh - 160px)}
.match-date-block{margin-bottom:16px}
.match-date-header{font-weight:bold;font-size:14px;color:var(--gold);margin-bottom:8px;padding-left:4px}
.match-live-block{margin-bottom:16px}
.match-live-header{font-weight:bold;font-size:14px;color:#ff4444;margin-bottom:8px;padding-left:4px;animation:pulse 1.5s infinite}
.match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1200px){.match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  body{padding:8px}
  h1{font-size:20px}
  #yearBadge{font-size:inherit}
  .sub{font-size:12px;margin-bottom:8px}
  .tabs{gap:3px;margin-bottom:10px}
  .tab-btn{padding:5px 10px;font-size:11px}
  .match-date-block{margin-bottom:10px}
  .match-live-block{margin-bottom:10px}
  .match-date-header{font-size:13px;margin-bottom:6px}
  .match-grid{grid-template-columns:1fr;gap:8px}
  .mc-head{padding:6px 8px 6px 35px;font-size:10px}
  .mc-time{font-size:11px}
  .mc-venue{font-size:9px}
  .mc-body{padding:6px 8px;gap:4px}
  .mc-vs{font-size:13px;gap:4px}
  .mc-vs b{font-size:10px;margin:0 1px}
  .mc-group-tag{font-size:8px;top:3px;left:5px}
  .mc-status{font-size:9px;padding:1px 4px}
  .mc-clock{font-size:10px;margin-left:2px}
  .mc-detail{padding:3px 8px 4px;font-size:9px}
  .mc-detail .dval{font-size:12px}
  .mc-verify{padding:2px 8px 4px;font-size:10px}
  .groups-grid{grid-template-columns:1fr;gap:8px}
  .standings-table{font-size:11px}
  .standings-table th,.standings-table td{padding:4px 5px}
  .modal-panel{width:98vw;max-height:95vh;border-radius:8px}
  .modal-header{padding:10px 12px 6px}
  .modal-header .mh-teams{font-size:15px;gap:8px}
  .modal-section{padding:8px 12px}
  .modal-section h4{font-size:12px}
  .modal-section .info-row{font-size:11px}
  .modal-section .player-table{font-size:10px}
  .prediction-box .pred-item .pred-val{font-size:18px}
  .modal-close{width:28px;height:28px;font-size:16px;margin:6px 6px 0 0}
  #tab-matches{padding:8px;height:calc(100vh - 140px)}
  #tab-bracket{height:calc(100vh - 140px)}
  .bracket-zoom-bar button{width:24px;height:24px;font-size:14px}
  .final-box{min-width:70px;padding:6px 8px}
  .final-box .f-title{font-size:10px}
  .bslot{font-size:8px;padding:2px 3px;min-height:20px}
  .bslot .team{font-size:10px}
  .bslot .desc{font-size:8px}
}
.match-card{border:1px solid rgba(240,192,64,.35);border-radius:8px;background:var(--card);overflow:hidden;transition:.15s;position:relative}
.match-card:hover{border-color:rgba(240,192,64,.6)}
.match-card.card-today{background:rgba(46,160,67,.1);border-color:rgba(46,160,67,.45)}
.match-card.card-today .mc-head{background:rgba(46,160,67,.12)}
.match-card.card-tomorrow{background:rgba(31,111,235,.1);border-color:rgba(31,111,235,.45)}
.match-card.card-tomorrow .mc-head{background:rgba(31,111,235,.12)}
.match-card.upset{border-color:#e5534b;background:rgba(229,83,75,.08);box-shadow:0 0 8px rgba(229,83,75,.25)}
.match-card.upset .mc-head{background:rgba(229,83,75,.18)}
.upset-badge{position:absolute;bottom:6px;right:8px;font-size:9px;background:rgba(229,83,75,.9);color:#fff;padding:2px 6px;border-radius:3px;font-weight:bold;z-index:2}
.score-clickable{cursor:pointer;transition:.15s;border-radius:4px}
.score-clickable:hover{background:rgba(240,192,64,.12)}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 7px 40px;font-size:11px;color:var(--muted);background:rgba(13,17,23,.5);border-bottom:1px solid var(--border)}
.mc-time{color:#f0c040;font-weight:bold;font-size:13px}
.mc-venue{font-size:10px;opacity:.8}
.mc-body{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.mc-team{display:flex;align-items:center;justify-content:space-between;font-size:13px;line-height:1.4}
.mc-team .tname{font-weight:bold}
.mc-vs{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:bold;padding:4px 0}
.mc-vs b{color:var(--muted);font-size:11px;margin:0 2px}
.mc-group-tag{position:absolute;top:4px;left:6px;font-size:9px;background:rgba(240,192,64,.15);color:var(--gold);padding:1px 5px;border-radius:3px;font-weight:bold}
.match-card{cursor:pointer}
/* 状态标签 */
.mc-status{font-size:10px;font-weight:bold;padding:2px 6px;border-radius:3px;white-space:nowrap}
.mc-clock{font-size:11px;font-weight:bold;color:var(--green);margin-left:4px;white-space:nowrap}
.mc-status.live{background:rgba(46,160,67,.15);color:#2ea043;animation:pulse 1.5s infinite}
.mc-status.finished{background:rgba(46,160,67,.15);color:#2ea043}
.mc-status.upcoming{background:rgba(125,133,144,.15);color:#7d8590}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
/* 比分详情行 */
.mc-detail{display:flex;justify-content:space-around;padding:4px 10px 6px;border-top:1px solid rgba(48,54,61,.2);font-size:10px;color:var(--muted)}
.mc-detail .ditem{text-align:center}
.mc-detail .dval{font-size:13px;font-weight:bold;color:var(--text)}
.mc-pred,.mc-verify{display:grid!important;grid-template-columns:0.7fr 1.8fr 1fr 0.8fr;align-items:center;font-size:11px;color:var(--muted);gap:0;padding:3px 10px}
.mc-pred{background:rgba(31,111,235,.08);padding-top:5px;padding-bottom:2px}
.mc-verify{padding-top:2px;padding-bottom:5px}
.mc-pred span,.mc-verify span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.mc-pred span:nth-child(1),.mc-verify span:nth-child(1){font-weight:bold}
.mc-pred b{color:var(--blue);font-weight:bold;font-size:13px}
.mc-pred+.mc-verify{border-top:1px solid rgba(48,54,61,.25)}
/* 移动端<b>标签内Unicode字符颜色继承bug，用更具体选择器+!important兜底 */
.mc-verify span b.v-ok{color:var(--green) !important;font-weight:bold;font-size:13px}
.mc-verify span b.v-no{color:var(--red) !important;font-weight:bold;font-size:13px}

/* ========== MATCH DETAIL MODAL ========== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;width:min(900px,95vw);max-height:90vh;overflow-y:auto;padding:0}
.modal-close{position:sticky;top:0;float:right;width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:#1a1f2b;color:var(--text);cursor:pointer;font-size:18px;z-index:5;margin:8px 8px 0 0;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-header{padding:14px 18px 8px;border-bottom:1px solid var(--border)}
.modal-header .mh-teams{display:flex;align-items:center;justify-content:center;gap:12px;font-size:18px;font-weight:bold;margin-bottom:6px}
.modal-header .mh-vs{color:var(--muted);font-size:14px}
.modal-header .mh-meta{text-align:center;font-size:12px;color:var(--muted)}
.modal-section{padding:12px 18px;border-bottom:1px solid rgba(48,54,61,.3)}
.modal-section:last-child{border-bottom:none}
.modal-section h4{font-size:13px;color:var(--gold);margin-bottom:8px}
.modal-section .info-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text)}
.modal-section .info-row .label{color:var(--muted)}
.modal-section .info-row .val{font-weight:bold}
.modal-section .player-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.modal-section .player-table th{text-align:left;padding:4px 6px;color:var(--muted);font-weight:normal;font-size:10px;border-bottom:1px solid var(--border)}
.modal-section .player-table td{padding:4px 6px;border-bottom:1px solid rgba(48,54,61,.2)}
.modal-section .player-table .pv{text-align:right;font-weight:bold;color:var(--gold)}
.modal-section .missing-tag{display:inline-block;font-size:11px;background:rgba(248,81,73,.15);color:var(--red);padding:2px 8px;border-radius:3px;margin:2px 4px 2px 0}
.modal-section .prediction-box{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.25);border-radius:8px;padding:12px;margin-top:6px}
.prediction-box .pred-row{display:flex;justify-content:space-around;text-align:center;margin-bottom:8px}
.prediction-box .pred-item{flex:1}
.prediction-box .pred-item .pred-label{font-size:11px;color:var(--muted)}
.prediction-box .pred-item .pred-val{font-size:22px;font-weight:bold;color:var(--gold)}
.prediction-box .pred-reason{font-size:12px;color:var(--text);line-height:1.6;border-top:1px solid rgba(48,54,61,.3);padding-top:8px;margin-top:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ========== BRACKET ZOOM + PAN ========== */
#tab-bracket{display:flex;flex-direction:column;align-items:center;height:calc(100vh - 160px);overflow:hidden}
.bracket-zoom-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;z-index:10}
.bracket-zoom-bar button{width:28px;height:28px;border:1px solid var(--border);border-radius:5px;background:#1a1f2b;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.bracket-zoom-bar button:hover{border-color:var(--gold);color:var(--gold)}
.bracket-zoom-bar .zoom-label{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.bracket-viewport{flex:1;width:100%;overflow:hidden;position:relative;cursor:grab;user-select:none;border:1px solid rgba(48,54,61,.3);border-radius:8px;background:rgba(13,17,23,.5)}
.bracket-viewport:active{cursor:grabbing}
.bracket-viewport.grabbing{cursor:grabbing}
.bracket-canvas{position:absolute;top:0;left:0;width:max-content;transform-origin:0 0;will-change:transform}
.bracket-canvas .tree-bracket{overflow:visible!important;width:auto!important}

/* ========== TREE BRACKET ========== */
.tree-bracket{
  display:flex;flex-direction:row;flex-wrap:nowrap;align-items:flex-start;
  justify-content:center;gap:10px;padding:20px 10px;min-width:1400px;
}
/* 每个大半区 = 两个子区上下堆叠（flex列） */
.bracket-half{
  display:flex;flex-direction:column;gap:10px;
  flex:none;align-self:flex-start;
}
/* 子区 = 8行×4列 Grid，固定行高避免1fr无限撑开 */
.bracket-sub{
  padding:6px 4px;
  flex:none;
}
.bk-slot{
  display:flex;align-items:center;justify-content:center;
  margin:1px 0;padding:2px 5px;
  border:1px dashed var(--border);border-radius:6px;
  font-size:11px;
  background:rgba(22,27,34,.92);
}
.bk-slot.s1{height:44px;align-self:center;}
/* R32单队伍槽位：紧凑高度 */
.r32-side{display:inline-flex;align-items:center;gap:1px;font-size:10px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vs-sm{font-size:9px;color:var(--muted);margin:0 2px;flex-shrink:0}
.t10{font-size:10px}
.b3-inline{color:var(--gold);cursor:pointer;font-size:10px;text-decoration:underline}
.bk-slot.s2{height:96px;align-self:center;}
.bk-slot.s4{height:200px;align-self:center;position:relative}
.bk-slot.s8{height:408px;align-self:center;position:relative}
/* winner用了flex-direction:column，需用justify-content控制垂直居中 */
.bk-slot.winner{border:1.5px solid rgba(240,192,64,.25);background:rgba(240,192,64,.06);flex-direction:column;justify-content:center}
.bk-slot .flag{font-size:13px;margin-right:3px}
.bk-slot .team{font-weight:bold;color:var(--text);font-size:11px;line-height:1.2}
.bk-slot .desc{color:var(--muted);font-size:9px}
.bk-slot.filled{border-color:var(--green);border-style:solid}

.bracket-center{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:18px;flex:0 0 auto;padding:0 14px;z-index:2;min-width:140px;align-self:center;
}
.final-box{
  background:rgba(22,27,34,.95);border:2px solid rgba(240,192,64,.3);border-radius:10px;
  padding:10px 14px;text-align:center;min-width:120px;
}
.final-box .f-title{font-size:13px;font-weight:bold;margin-bottom:6px;color:var(--gold)}
.final-box.champion{border-color:var(--gold);border-width:3px;background:linear-gradient(135deg,rgba(240,192,64,.18),rgba(240,192,64,.04),rgba(22,27,34,.95))}
.final-box.champion .f-title{color:var(--gold);font-size:14px}
.final-box.third{border-color:rgba(192,192,192,.5);background:linear-gradient(135deg,rgba(192,192,192,.1),rgba(22,27,34,.95))}
.final-box.third .f-title{color:var(--muted)}
.final-box .bslot{margin:3px 0;padding:4px 6px;min-width:80px;max-width:110px;border:1px dashed var(--border);border-radius:5px;font-size:11px;min-height:26px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.final-box .bslot .team{font-weight:bold;font-size:11px}
.final-box .bslot .desc{color:var(--muted);font-size:9px}

@media(max-width:1200px){
  .tree-bracket{min-width:1150px}
  .bracket-half{grid-template-columns:repeat(4,80px)}
}
@media(max-width:768px){
  .tree-bracket{min-width:900px;padding:10px 0}
  .bracket-half{grid-template-columns:repeat(4,65px)}
  .bk-slot{min-height:22px;padding:2px 3px;font-size:10px}
}

/* best 3rd table */
.best3rd-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.best3rd-table th,.best3rd-table td{padding:4px 7px;text-align:center;border:1px solid var(--border)}
.best3rd-table tr.qualify{background:rgba(63,185,80,.08)}
.best3rd-table tr.miss{opacity:.4}

/* modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px}
.modal-box h3{margin-bottom:12px}
.modal-box .score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.modal-box .score-row input{width:50px;height:32px;text-align:center;background:#0d1117;
  color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:18px}
.modal-box .btn-row{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;background:var(--card);color:var(--text)}
.btn.primary{background:var(--green);border-color:var(--green);color:#000}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.small{padding:3px 10px;font-size:11px}

/* 赛果/预测输入弹窗 */
.input-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;max-width:480px;width:90vw;max-height:85vh;overflow-y:auto}
.input-modal h3{color:var(--gold);margin-bottom:16px;font-size:16px;text-align:center}
.input-modal .score-col{margin-bottom:14px}
.input-modal .score-col label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.input-modal .score-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.input-modal .score-row .vs{color:var(--muted);font-size:18px;font-weight:bold}
.input-modal .score-row input{width:55px;height:36px;text-align:center;background:#0d1117;color:var(--gold);border:1px solid var(--border);border-radius:6px;font-size:22px;font-weight:bold}
.input-modal .pred-section{margin-bottom:14px}
.input-modal .pred-section h4{font-size:13px;color:var(--gold);margin-bottom:8px}
.input-modal .pred-options{display:flex;flex-wrap:wrap;gap:6px}
.input-modal .pred-option{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;transition:.15s}
.input-modal .pred-option:hover{border-color:var(--gold)}
.input-modal .pred-option.sel{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.1)}

@media(max-width:900px){.groups-grid{grid-template-columns:1fr}}

/* ========== 进球弹窗 Toast ========== */
.goal-toast-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.55);z-index:2000;
  display:flex;align-items:flex-start;justify-content:center;padding-top:60px;
  animation:fadeIn .25s;
}
.goal-toast{
  background:linear-gradient(135deg,#1a2e1a 0%,#0d1117 100%);
  border:2px solid var(--gold);border-radius:14px;
  padding:18px 24px;min-width:320px;max-width:420px;
  box-shadow:0 0 40px rgba(240,192,64,0.35);
  animation:slideDown .4s cubic-bezier(.17,.67,.35,1);
  position:relative;
}
.goal-toast .goal-icon{font-size:36px;margin-bottom:6px;text-align:center}
.goal-toast .goal-time{font-size:12px;color:var(--muted);margin-bottom:4px;text-align:center}
.goal-toast .goal-scorer{font-size:18px;font-weight:bold;color:var(--gold);margin-bottom:2px;text-align:center}
.goal-toast .goal-team{font-size:13px;color:var(--text);margin-bottom:6px;text-align:center}
.goal-toast .goal-score{font-size:26px;font-weight:bold;color:var(--text);text-align:center;margin-top:8px}
.goal-toast .goal-close{
  position:absolute;top:8px;right:12px;cursor:pointer;
  color:var(--muted);font-size:18px;background:none;border:none;
}
.goal-toast .goal-close:hover{color:var(--red)}
@keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
.match-card.pressing{opacity:.7;transform:scale(.98);transition:.3s}
/* 爆冷标记弹窗 */

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

</style>

<body>

<script>

// ========== 进球事件存储 ==========
let goalEvents = {};
let upsetMatches = []; // 从 GitHub Pages 加载
let _upsetPending = null; // 待标记的 match id
const SCF_UPSETS_URL = 'https://1443588797-jduje0b8vt.ap-guangzhou.tencentscf.com/upsets';
const ADMIN_PWD = 'blg-admin';
// 加载远程爆冷标记（GitHub Pages JSON）
async function loadUpsets() {
  try {
    const resp = await fetch(SCF_UPSETS_URL, { cache: 'no-cache' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    // SCF 返回对象 {matchId: true, ...}
    upsetMatches = Array.isArray(data) ? data : Object.keys(data).filter(k => data[k] === true);
    console.log('[爆冷] SCF加载成功:', upsetMatches);
  } catch(e) {
    console.warn('[爆冷] SCF加载失败，兜底GitHub', e.message);
    try {
      const resp2 = await fetch('https://BAILG-git.github.io/worldcup-26/data/upsets.json?t=' + Date.now());
      if (resp2.ok) { const d = await resp2.json(); upsetMatches = Object.keys(d).filter(k => d[k] === true); }
    } catch(e2) {}
  }
}
// 保存爆冷标记到本地 + localStorage（后续可通过 GitHub API 同步）
async function saveUpsets() {
  try {
    const body = {};
    upsetMatches.forEach(mid => { body[mid] = true; });
    const resp = await fetch(SCF_UPSETS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (resp.ok) console.log('[爆冷] SCF同步成功');
    else console.warn('[爆冷] SCF同步失败 HTTP', resp.status);
  } catch(e) { console.warn('[爆冷] SCF同步失败', e.message); }
}
// ========== 事件委托：点击最终比分标记爆冷 + 点击卡片看详情 ==========
function setupMatchCardEvents() {
  const cont = document.getElementById('tab-matches');
  if (!cont || cont._evtBound) return;
  cont._evtBound = true;
  // 点击最终比分 → 标记/取消爆冷（仅完赛）
  cont.addEventListener('click', e => {
    const scoreEl = e.target.closest('.score-clickable');
    if (scoreEl) {
      e.stopPropagation(); // 防止触发卡片详情
      const card = scoreEl.closest('.match-card');
      if (!card) return;
      const mid = card.dataset.mid;
      const m = _matchMap[mid];
      if (!m) return;
      _upsetPending = mid;
      const isUpset = upsetMatches.includes(mid);
      document.getElementById('upsetModalTitle').textContent = isUpset ? '取消爆冷标记' : '标记为爆冷';
      document.getElementById('upsetModalText').textContent = isUpset
        ? `确认取消 ${m.home} vs ${m.away} 的爆冷标记？`
        : `确认将 ${m.home} vs ${m.away} 标记为爆冷？`;
      document.getElementById('upsetConfirmBtn').textContent = '确认';
      document.getElementById('upsetModal').style.display = 'flex';
      return;
    }
    // 点击卡片其他区域 → 打开详情
    const card = e.target.closest('.match-card');
    if (card && _matchMap[card.dataset.mid]) {
      showMatchDetail(_matchMap[card.dataset.mid]);
    }
  });
}

function closeUpsetModal() {
  document.getElementById('upsetModal').style.display = 'none';
  _upsetPending = null;
}
function confirmUpset() {
  document.getElementById('upsetModal').style.display = 'none'; // 不清 _upsetPending
  document.getElementById('adminPwd').value = '';
  document.getElementById('adminErr').style.display = 'none';
  document.getElementById('adminModal').style.display = 'flex';
  setTimeout(() => document.getElementById('adminPwd').focus(), 100);
}
function closeAdminModal() {
  document.getElementById('adminModal').style.display = 'none';
  _upsetPending = null;
}
function verifyAdmin() {
  const pwd = document.getElementById('adminPwd').value;
  const mid = _upsetPending; // 提前保存，避免被 closeAdminModal 清空
  if (pwd === ADMIN_PWD) {
    closeAdminModal();
    if (mid) {
      const idx = upsetMatches.indexOf(mid);
      if (idx >= 0) { upsetMatches.splice(idx, 1); }
      else { upsetMatches.push(mid); }
      renderMatches();
      saveUpsets();
    }
  } else {
    document.getElementById('adminErr').style.display = 'block';
    document.getElementById('adminPwd').value = '';
  }
}
let prevScores = {};
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playGoalSound(){
  try{
    const ctx = getAudioCtx();
    [0,0.25,0.5].forEach((delay,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i===2 ? 880 : 660;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.25);
    });
  }catch(e){}
}
function showGoalToast(team, minute, scoreH, scoreA, home, away, player, goalType){
  document.getElementById('goalTime').textContent = minute || '';
  const typeLabel = goalType === 'penalty_scored' ? '⚽ 点球！' : goalType === 'own_goal' ? '😱 乌龙球！' : '⚽ 进球！';
  document.getElementById('goalScorer').textContent = player ? player : typeLabel;
  document.getElementById('goalTeam').textContent = team + (goalType === 'own_goal' ? ' 乌龙' : ' 进球');
  document.getElementById('goalScore').textContent = home + ' ' + scoreH + ' - ' + scoreA + ' ' + away;
  document.getElementById('goalToast').style.display = 'flex';
  playGoalSound();
  clearTimeout(window._goalToastTimer);
  window._goalToastTimer = setTimeout(closeGoalToast, 6000);
}
function closeGoalToast(){
  document.getElementById('goalToast').style.display = 'none';
  clearTimeout(window._goalToastTimer);
}

// ========== DATA ==========
const GROUPS = {
  A: ["墨西哥","南非","韩国","捷克"],
  B: ["加拿大","波黑","卡塔尔","瑞士"],
  C: ["巴西","摩洛哥","海地","苏格兰"],
  D: ["美国","巴拉圭","澳大利亚","土耳其"],
  E: ["德国","库拉索","科特迪瓦","厄瓜多尔"],
  F: ["荷兰","日本","瑞典","突尼斯"],
  G: ["比利时","埃及","伊朗","新西兰"],
  H: ["西班牙","佛得角","沙特阿拉伯","乌拉圭"],
  I: ["法国","塞内加尔","伊拉克","挪威"],
  J: ["阿根廷","阿尔及利亚","奥地利","约旦"],
  K: ["葡萄牙","民主刚果","乌兹别克斯坦","哥伦比亚"],
  L: ["英格兰","克罗地亚","加纳","巴拿马"]
};

// 国旗 ISO 3166-1 alpha-2 代码映射（用于 flagcdn.com CDN 图片）
const FLAG_CDN = {
  "墨西哥":"mx","南非":"za","韩国":"kr","捷克":"cz",
  "加拿大":"ca","波黑":"ba","卡塔尔":"qa","瑞士":"ch",
  "巴西":"br","摩洛哥":"ma","海地":"ht","苏格兰":"gb-sct",
  "美国":"us","巴拉圭":"py","澳大利亚":"au","土耳其":"tr",
  "德国":"de","库拉索":"cw","科特迪瓦":"ci","厄瓜多尔":"ec",
  "荷兰":"nl","日本":"jp","瑞典":"se","突尼斯":"tn",
  "比利时":"be","埃及":"eg","伊朗":"ir","新西兰":"nz",
  "西班牙":"es","佛得角":"cv","沙特阿拉伯":"sa","乌拉圭":"uy",
  "法国":"fr","塞内加尔":"sn","伊拉克":"iq","挪威":"no",
  "阿根廷":"ar","阿尔及利亚":"dz","奥地利":"at","约旦":"jo",
  "葡萄牙":"pt","民主刚果":"cd","乌兹别克斯坦":"uz","哥伦比亚":"co",
  "英格兰":"gb-eng","克罗地亚":"hr","加纳":"gh","巴拿马":"pa"
};
// 国旗图片 HTML 生成函数（使用 flagcdn.com CDN，兼容所有操作系统）
function flagImg(name, size) {
  const code = FLAG_CDN[name];
  if (!code) return '';
  const w = size || 22;
  const h = Math.round(w * 2 / 3);
  return `<img src="https://flagcdn.com/w40/${code}.png" 
    width="${w}" height="${h}" 
    style="vertical-align:middle;margin-right:4px;border-radius:2px;display:inline-block"
    alt="${name}" title="${name}" loading="lazy">`;
}

// 兼容旧格式 goals：将 "3球/1球（小球）" → "1, 3"，新格式 "1, 3" 直接返回
function normalizeGoals(g) {
  if (!g) return '-';
  // 已经是新格式：纯数字+逗号+空格+数字
  if (/^\d+,\s*\d+$/.test(g)) return g;
  // 旧格式：提取括号前的进球数字
  const nums = [];
  const re = /(\d+)球/g;
  let m;
  while ((m = re.exec(g)) !== null) nums.push(parseInt(m[1]));
  if (nums.length >= 2) { nums.sort((a,b)=>a-b); return nums[0]+', '+nums[1]; }
  if (nums.length === 1) return nums[0]+', '+nums[0];
  // 括号内范围如 "1-3"
  const rm = g.match(/[（(](.+)[)）]/);
  if (rm) {
    const parts = rm[1].split(/[-–—]/);
    if (parts.length >= 2) { const a=parseInt(parts[0]),b=parseInt(parts[1]); if(!isNaN(a)&&!isNaN(b)) return Math.min(a,b)+', '+Math.max(a,b); }
  }
  return '-';
}

function computeQualifiers() {
  const s = calcStandings();
  const map = {};
  for (const [g, rows] of Object.entries(s)) {
    map[`1${g}`] = rows[0].team;
    map[`2${g}`] = rows[1].team;
    map[`3${g}`] = rows[2].team;
  }
  // best 3rd ranks
  const thirds = calcBestThirds(s);
  const top8 = thirds.slice(0, 8).map(t => t.group);
  map._top8 = top8;
  return map;
}

// FIFA 第三名分配矩阵: 根据哪些组的第三名晋级，决定 1A~1H 各对哪个第三
// 默认邻组互换: 1A↔3C, 1B↔3D, 1C↔3A, 1D↔3B, 1E↔3F, 1F↔3E, 1G↔3H, 1H↔3G
// 备选表基于 FIFA 官方 56 种组合表的"相邻优先+跨区兜底"原则:
//   A-D 组(UPA半区)优先取 A-D 及相邻组，然后 E-H，最后 I-L
//   E-H 组(DOWN半区)优先取 E-H 及相邻组，然后 A-D，最后 I-L
// FIFA 第三名分配矩阵: 默认邻组互换
// 1A↔3C, 1B↔3D, 1C↔3A, 1D↔3B, 1E↔3F, 1F↔3E, 1G↔3H, 1H↔3G
// 唯一约束: 小组第一不碰自己组的第三（getThirdForWinner内处理）
const Q_ZONES = {
  'Q1': ['A','B','C'], 'Q2': ['D','I','K'],
  'Q3': ['E','F','G'], 'Q4': ['H','J','L'],
};
const THIRD_MATRIX = {
  'A':{'dflt':'C','fbs':['D','E','F','G','H','I','J','K','L','B']},
  'B':{'dflt':'D','fbs':['E','F','G','H','I','J','K','L','A','C']},
  'C':{'dflt':'A','fbs':['B','D','E','F','G','H','I','J','K','L']},
  'D':{'dflt':'B','fbs':['A','C','E','F','G','H','I','J','K','L']},
  'E':{'dflt':'F','fbs':['G','H','A','B','C','D','I','J','K','L']},
  'F':{'dflt':'E','fbs':['G','H','A','B','C','D','I','J','K','L']},
  'G':{'dflt':'H','fbs':['I','A','B','C','D','E','F','J','K','L']},
  'H':{'dflt':'G','fbs':['I','A','B','C','D','E','F','J','K','L']},
  'I':{'dflt':'J','fbs':['K','L','A','B','C','D','E','F','G','H']},
  'J':{'dflt':'I','fbs':['K','L','A','B','C','D','E','F','G','H']},
  'K':{'dflt':'L','fbs':['I','J','A','B','C','D','E','F','G','H']},
  'L':{'dflt':'K','fbs':['I','J','A','B','C','D','E','F','G','H']},
};
// 获取某小组第一应对的第三名小组字母
// 约束1: 不能碰自己小组的第三（1A不碰3A）
// 约束2: 不能碰同Q区的第三（Q1第一不碰Q1各组第三）
// 8支晋级第三抽签均分至4个Q区，每区2支外来第三名
function getThirdForWinner(wGroup, top8) {
  const m = THIRD_MATRIX[wGroup];
  if (!m) return top8[0];
  // 找出wGroup所在Q区，排除本区所有第三名
  let blocked = [];
  for (const [, groups] of Object.entries(Q_ZONES)) {
    if (groups.includes(wGroup)) { blocked = groups; break; }
  }
  // 1. 默认第三（邻组互换），但不碰本Q区
  if (top8.includes(m.dflt) && !blocked.includes(m.dflt)) return m.dflt;
  // 2. 按备选表找第一个晋级且不在本Q区内的
  for (const g of m.fbs) {
    if (top8.includes(g) && g !== wGroup && !blocked.includes(g)) return g;
  }
  // 3. 兜底: 取任意晋级第三(不同组且不同Q区)
  const fallback = top8.find(g => g !== wGroup && !blocked.includes(g));
  return fallback || top8[0];
}

function assignThirds(q, defs) {
  const top8 = q._top8;
  const used = [];
  const usedGroups = new Set();
  // 收集所有3rd槽位
  const b3Slots = defs.filter(d => d.h === '3rd');
  // 逐个分配
  for (const d of b3Slots) {
    if (usedGroups.size >= 8) break;
    // 从q字段推断同区组(如 R16_L1A → L)
    const qZone = (d.q || '')[4] || '';
    const available = top8.filter(g => !usedGroups.has(g));
    if (available.length === 0) break;
    const thirdGroup = getThirdForWinner(qZone, available);
    used.push({ group: thirdGroup, slotId: d.id });
    usedGroups.add(thirdGroup);
  }
  return used;
}

// 填充B32槽位（实时从积分榜落位，3rd=点击选择最佳第三）
function fillBracket() {
  const standings = calcStandings();
  const b3s = loadB3Selections();
  koSlot = {};
  for (const d of B32_DEF) {
    const resolveTeam = (code, isB3) => {
      if (code === '3rd') {
        const t = b3s[d.id];
        return { team: t || '3rd', isB3: true };
      }
      const pos = parseInt(code[0]) - 1;
      const grp = code[1];
      const groupRows = standings[grp];
      if (groupRows && groupRows[pos]) return { team: groupRows[pos].team, isB3: false };
      return { team: code, isB3: false };
    };
    const h = resolveTeam(d.h);
    koSlot[d.id] = { home: h.team, homeB3: h.isB3 };
  }
  if (currentTab === 'bracket') renderBracket();
}

// 决定淘汰赛胜者
function getKoWinner(slotId) {
  const s = koScores[slotId];
  if (!s || s[0] === null || s[1] === null) return null;
  return s[0] > s[1] ? koSlot[slotId]?.home :
         s[1] > s[0] ? koSlot[slotId]?.away : null; // 平局等点球，暂null
}

// 向下传播胜者
function propagateKnockout() {
  const entries = Object.entries(NEXT);
  for (const [from, to] of entries) {
    const w = getKoWinner(from);
    if (!w) continue;
    if (!koSlot[to]) koSlot[to] = {};
    const siblings = entries.filter(([,t]) => t === to);
    const myIdx = siblings.findIndex(([f]) => f === from);
    if (myIdx === 0 || !koSlot[to].home) koSlot[to].home = w;
    else koSlot[to].away = w;
  }
  // SF losers → 季军赛
  const sfLosers = {};
  for (const sfId of ['SF_L', 'SF_R']) {
    const s = koScores[sfId];
    const slot = koSlot[sfId];
    if (!s || s[0]===null || !slot) continue;
    if (s[0] < s[1]) sfLosers[sfId] = slot.home;
    else if (s[1] < s[0]) sfLosers[sfId] = slot.away;
  }
  if (sfLosers.SF_L || sfLosers.SF_R) {
    koSlot['THIRD'] = koSlot['THIRD'] || {};
    if (sfLosers.SF_L) koSlot['THIRD'].home = sfLosers.SF_L;

// ========== STANDINGS ==========
// FIFA 2026 小组排名 tiebreak 完整链:
// 1.积分 2.净胜球 3.进球 4.相互战绩(积分→净胜→进球) 5.公平竞赛 6.抽签
// 公平竞赛积分: 黄牌-1, 间接红牌(两黄)-3, 直接红牌-4, 黄牌+直接红牌-5
// 积分越低越好(越干净)

// 公平竞赛数据 (初始为0，可通过API或手动更新)
let fairPlay = {}; // {teamName: 负分 }

function h2hCompare(teamA, teamB, groupMatches, scores) {
  // 只计算两队之间的比赛
  const gm = groupMatches.filter(m =>
    (m.home === teamA && m.away === teamB) || (m.home === teamB && m.away === teamA)
  );
  if (gm.length === 0) return 0;
  const h2h = { [teamA]: { pts: 0, gf: 0, ga: 0 }, [teamB]: { pts: 0, gf: 0, ga: 0 } };
  for (const m of gm) {
    const s = scores[m.id];
    if (!s || s[0] === null) return 0;
    if (m.home === teamA) {
      h2h[teamA].gf += s[0]; h2h[teamB].gf += s[1];
      h2h[teamA].ga += s[1]; h2h[teamB].ga += s[0];
    } else {
      h2h[teamB].gf += s[0]; h2h[teamA].gf += s[1];
      h2h[teamB].ga += s[1]; h2h[teamA].ga += s[0];
    }
    if (s[0] > s[1]) {
      const w = m.home === teamA ? teamA : teamB;
      h2h[w].pts += 3;
    } else if (s[0] < s[1]) {
      const w = m.home === teamA ? teamB : teamA;
      h2h[w].pts += 3;
    } else { h2h[teamA].pts++; h2h[teamB].pts++; }
  }
  const a = h2h[teamA], b = h2h[teamB];
  return b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf || 0;
}

function fairPlayCompare(teamA, teamB) {
  const fpA = fairPlay[teamA] || 0, fpB = fairPlay[teamB] || 0;
  return fpA - fpB; // 负分越大(扣分多)排在后面，即 fp值小的排在前面
}

// 确定性排序兜底：队名字符串 hash → 0~1 小数，保证同分不跳
function tieHash(a, b) {
  let ha = 0, hb = 0;
  for (let i = 0; i < a.length; i++) ha = ((ha << 5) - ha) + a.charCodeAt(i);
  for (let i = 0; i < b.length; i++) hb = ((hb << 5) - hb) + b.charCodeAt(i);
  return (ha & 0x7fffffff) / 0x7fffffff - (hb & 0x7fffffff) / 0x7fffffff;
}

function calcStandings() {
  const standings = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    const rec = {};
    for (const t of teams) rec[t] = { team: t, pts: 0, mp: 0, gf: 0, ga: 0, gd: 0, w: 0, d: 0, l: 0 };
    for (const m of GROUP_MATCHES[g]) {
      const s = scores[m.id];
      if (s && s[0] !== null && s[1] !== null) {
        const h = m.home, a = m.away;
        rec[h].mp++; rec[a].mp++; rec[h].gf += s[0]; rec[a].gf += s[1];
        rec[h].ga += s[1]; rec[a].ga += s[0];
        if (s[0] > s[1]) { rec[h].pts += 3; rec[h].w++; rec[a].l++; }
        else if (s[0] < s[1]) { rec[a].pts += 3; rec[a].w++; rec[h].l++; }
        else { rec[h].pts++; rec[a].pts++; rec[h].d++; rec[a].d++; }
      }
    }
    for (const t of teams) rec[t].gd = rec[t].gf - rec[t].ga;
    // 完整 tiebreak 排序
    standings[g] = Object.values(rec).sort((a, b) =>
      b.pts - a.pts ||                    // 1. 积分
      b.gd - a.gd ||                      // 2. 净胜球
      b.gf - a.gf ||                      // 3. 进球
      h2hCompare(a.team, b.team, GROUP_MATCHES[g], scores) || // 4. 相互战绩
      fairPlayCompare(a.team, b.team) ||  // 5. 公平竞赛
      tieHash(a.team, b.team)             // 6. 抽签（队名hash确定排序，不跳）
    );
  }
  return standings;
}

// 跨组最佳第三排名 tiebreak: 1.积分 2.净胜球 3.进球 4.公平竞赛 5.抽签（无相互战绩）
function calcBestThirds(s) {
  const t = [];
  for (const [g, r] of Object.entries(s)) t.push({ ...r[2], group: g });
  t.sort((a, b) =>
    b.pts - a.pts ||                // 1. 积分
    b.gd - a.gd ||                  // 2. 净胜球
    b.gf - a.gf ||                  // 3. 进球
    ((fairPlay[a.team] || 0) - (fairPlay[b.team] || 0)) || // 4. 公平竞赛
    tieHash(a.team, b.team)         // 5. 抽签（队名hash确定排序，不跳）
  );
  return t;
}

        <div class="mc-vs">${flagImg(m.home,18)}<span>${tname(m.home)}</span> <b>vs</b> ${flagImg(m.away,18)}<span>${tname(m.away)}</span></div>
        <div class="mc-detail">

function renderMatches(){
  const cont=document.getElementById('tab-matches');
  let all=[];
  for(const[g,ms] of Object.entries(GROUP_MATCHES)){
    ms.forEach(m=>all.push({...m,group:g}));
  }
  all.sort((a,b)=>{
    const pa=a.date.match(/(\d+)月(\d+)日/), pb=b.date.match(/(\d+)月(\d+)日/);
    const aM=parseInt(pa[1]),aD=parseInt(pa[2]),bM=parseInt(pb[1]),bD=parseInt(pb[2]);
    if(aM!==bM)return aM-bM;
    if(aD!==bD)return aD-bD;
    return a.time.localeCompare(b.time);
  });
  _matchMap={};
  // 先提取直播中的比赛
  const liveMatches=[], normalMatches=[];
  for(const m of all){
    _matchMap[m.id]=m;
    const st=matchStatus[m.id]||'SCHEDULED';
    if(st==='LIVE') liveMatches.push(m); else normalMatches.push(m);
  }
  let html='';
  // 计算今日/明日日期字符串（格式 "6月18日"）
  const tdy=new Date();
  const tdyStr=`${tdy.getMonth()+1}月${tdy.getDate()}日`;
  const tom=new Date(tdy); tom.setDate(tdy.getDate()+1);
  const tomStr=`${tom.getMonth()+1}月${tom.getDate()}日`;
  const todayMatches=normalMatches.filter(m=>m.date===tdyStr);
  const tomorrowMatches=normalMatches.filter(m=>m.date===tomStr);
  // 直播比赛最顶部
  if(liveMatches.length>0){
    html+='<div class="match-live-block"><div class="match-live-header">🔴 正在直播</div><div class="match-grid">';
    for(const m of liveMatches){
      html+=buildMatchCard(m);
    }
    html+='</div></div>';
  }
  // 今日赛程紧跟直播下方（无直播时直接置顶）
  if(todayMatches.length>0){
    html+=`<div class="match-date-block"><div class="match-date-header">📅 今日赛程 · ${tdyStr}</div><div class="match-grid">`;
    for(const m of todayMatches){
      html+=buildMatchCard(m);
    }
    html+='</div></div>';
  }
  // 明日赛程紧跟今日下方
  if(tomorrowMatches.length>0){
    html+=`<div class="match-date-block"><div class="match-date-header">🗓️ 明日赛程 · ${tomStr}</div><div class="match-grid">`;
    for(const m of tomorrowMatches){
      html+=buildMatchCard(m);
    }
    html+='</div></div>';
  }
  // 其余赛程（跳过今日和明日，避免重复）
  let curDate='';
  for(const m of all){
    if(m.date===tdyStr||m.date===tomStr) continue;
    if(m.date!==curDate){
      if(curDate) html+='</div>';
      curDate=m.date;
      html+=`<div class="match-date-block"><div class="match-date-header">${curDate}</div><div class="match-grid">`;
    }
    html+=buildMatchCard(m);
  }
  if(curDate) html+='</div></div>';
  cont.innerHTML=html;
  setupMatchCardEvents();
}

  const injuryImpact=(-hKeyInjury*0.08+aKeyInjury*0.08-hSus*0.06+aSus*0.06)*0.20;
  function getMotivationObj(mid){const p=mid.split(/[_-]/);if(/^[A-L]$/.test(p[0])){const r=parseInt(p[1])||0;if(r>=3)return{val:1.30,label:'生死战'};if(r===2)return{val:1.12,label:'关键战'};return{val:1.00,label:'首轮'};}if(/r32/.test(mid))return{val:1.25,label:'淘汰赛'};if(/r16/.test(mid))return{val:1.30,label:'16强'};if(/qf/.test(mid))return{val:1.35,label:'8强'};if(/sf/.test(mid))return{val:1.40,label:'4强'};if(/final/.test(mid))return{val:1.45,label:'决赛'};return{val:1.10,label:'常规'};}
  const motivationObj=getMotivationObj(m.id);const motivation=motivationObj.val;

  // K3：伤停修正（按位置细分）
  // 前锋伤停：进攻λ扣0.3/人；后腰/中场伤停：攻守各扣0.15/人；后卫伤停：防守λ扣0.25/人
  function classifyInjuries(injList){

  KA3 -= aInjCls.fwd*0.30 + aInjCls.mid*0.15;
  KH3 += aInjCls.def*0.25; // 客队后防缺人→主队进攻受益

  // K4：战术克制修正
  // 攻强 vs 防强对局：高压/传控 vs 防守/反击，进球预期下调5%

  if((hs.style.includes('高压')||hs.style.includes('传控')||hs.style.includes('控球'))&&(as.style.includes('防守')||as.style.includes('反击')||as.style.includes('稳守')))K4=0.95;

  // ===== λ最终计算（v15.3 防守项改除法→正确逻辑） =====

  if(ct.length>=2){coldWarn=ct.join('；');isCold=true;}

  // ===== 赛果 =====
  const hg=s1.hg,ag=s1.ag;let wdl='',wdlLabel='';
  if(hg>ag){wdl='主胜';wdlLabel=m.home+'·胜';}else if(hg<ag){wdl='客胜';wdlLabel=m.away+'·胜';}else{wdl='平局';wdlLabel='平局';}

  // 总进球分布
  const gDist=[];for(let t=0;t<=7;t++){let tp=0;for(const pr of probs){if(pr.hg+pr.ag===t)tp+=pr.p;}gDist.push({t,p:tp});}
  gDist.sort((a,b)=>b.p-a.p);const topGArr=gDist.slice(0,2).map(g=>g.t).sort((a,b)=>a-b);const goalsSmall= topGArr[0]+', '+topGArr[1];

  // 让球方向
  let handicapDir='';if(spread!==0){const ah=hg-spread,aag=ag;if(ah>aag)handicapDir='让胜';else if(ah<aag)handicapDir='让负';else handicapDir='让平';}

  const expTotal=lambdaH+lambdaA;
  const goalsRange=expTotal<=2?'小球':expTotal<=3?'中小球':expTotal<=3.5?'适中':'大球';
  let conf=s1.p>0.12?'高':s1.p<0.06?'低':'中';if(isCold&&conf==='高')conf='中';

  // ===== 分析文本 =====
  let reasons=[];
  const strongName=deltaS>0?tname(m.home):tname(m.away);
  if(Math.abs(deltaS)>18)reasons.push('【实力】'+strongName+'全面占优（ΔS='+Math.round(deltaS)+'）');
  else if(Math.abs(deltaS)>8)reasons.push('【实力】'+strongName+'占优（ΔS='+Math.round(deltaS)+'）');
  else reasons.push('【实力】势均力敌（ΔS='+Math.round(deltaS)+'）');
  reasons.push('【攻防】'+tname(m.home)+'攻'+hs.attack.toFixed(1)+'/守'+hs.defense.toFixed(1)+' vs '+tname(m.away)+'攻'+as.attack.toFixed(1)+'/守'+as.defense.toFixed(1));
  reasons.push('【打法】'+hs.style+' vs '+as.style+(styleBonus!==0?(styleBonus>0?('（克制'+tname(m.home)+'）'):('（克制'+tname(m.away)+'）')):''));
  reasons.push('【战意】'+motivationObj.label+(wcNote?(' · '+wcNote):''));
  const sp=[];if(hKeyInjury)sp.push(tname(m.home)+'核心伤'+hKeyInjury);if(aKeyInjury)sp.push(tname(m.away)+'核心伤'+aKeyInjury);if(hSus)sp.push(tname(m.home)+'停'+hSus);if(aSus)sp.push(tname(m.away)+'停'+aSus);
  reasons.push(sp.length?'【伤停】'+sp.join('，'):'【伤停】阵容完整');
  if(isHost)reasons.push('【主场】'+tname(m.home)+'东道主（K2='+K2+'）');
  reasons.push('【概率】胜平负 '+Math.round(probH*100)+'%/'+Math.round(probD*100)+'%/'+Math.round(probA*100)+'%');
  if(oddsInfo){reasons.push('【盘口】'+oddsInfo.asian.replace('亚盘 ','')+' | '+oddsInfo.ou.replace('大小球 ','')+' | 市场'+oddsInfo.implied);if(handicapDir)reasons.push('【让球】'+handicapDir);}
  reasons.push('【预期】λ₁='+lambdaH.toFixed(2)+' λ₂='+lambdaA.toFixed(2)+' | 总进'+expTotal.toFixed(1)+'球（'+goalsRange+'）');
  reasons.push('【比分】①'+scoreA+'（'+wdlLabel+'，置信'+conf+'）②'+scoreCStr+'（备选）');
  if(coldWarn)reasons.push('⚠️冷门预警：'+coldWarn);
  return{
    score:scoreA,scoreC:scoreCStr,wdl,wdlLabel,
    goals:goalsSmall,goalsNum:Math.round(hg+ag),
    reason:reasons.join('；'),isUpset:isCold,coldWarning:coldWarn,
    confidence:conf,lambda:{h:lambdaH,a:lambdaA,total:expTotal},
    handicap:handicapDir,goalsRange,oddsInfo,deltaS,
    probH:probH,probD:probD,probA:probA
  };
}

// 渲染一个象限（8行 × 4列）
// side='L'|'R', upper=true|false
function renderQuarter(side, upper, label, color1, color2){
  const prefix = 'R32_'+side;
  const startIdx = upper ? 0 : 8;
  const r32Slots = B32_DEF.filter(d=>d.id.startsWith(prefix)).sort((a,b)=>a.id.localeCompare(b.id)).slice(startIdx, startIdx+8);
  const r16Base = 'R16_'+side;
  const qfBase = 'QF_'+side;
  const sfSlot = 'SF_'+side;

  const r16Start = upper ? 1 : 5;
  const r16Slots = [];
  for(let i=r16Start;i<r16Start+4;i++) r16Slots.push(r16Base+String(i).padStart(2,'0'));

  const qfStart = upper ? 1 : 3;
  const qfSlots = [];
  for(let i=qfStart;i<qfStart+2;i++) qfSlots.push(qfBase+String(i).padStart(2,'0'));

  const rev = side === 'R';
  let h='';
  h+=`<div class="bracket-quarter" style="border:2px solid ${upper?(side==='L'?'#3fb950':'#58a6ff'):(side==='L'?'#f0c040':'#d2a8ff')};border-radius:8px;overflow:hidden">`;
  h+=`<div class="q-header" style="text-align:center;padding:6px;font-weight:bold;font-size:13px;color:${upper?(side==='L'?'#3fb950':'#58a6ff'):(side==='L'?'#f0c040':'#d2a8ff')};background:rgba(255,255,255,.05)}">${label}</div>`;
  h+=`<div style="display:grid;grid-template-rows:repeat(8,52px);grid-template-columns:160px 144px 124px 112px;gap:0 4px;padding:6px 6px;position:relative">`;

  // 背景色块：每象限2个小半区（各4行）
  h+=`<div style="grid-column:1/-1;grid-row:1/span 4;background:${color1};border-radius:5px;margin:1px 0"></div>`;
  h+=`<div style="grid-column:1/-1;grid-row:5/span 4;background:${color2};border-radius:5px;margin:1px 0"></div>`;

  const c1 = rev ? [sfSlot] : r32Slots;
  const c2 = rev ? qfSlots : r16Slots;
  const c3 = rev ? r16Slots : qfSlots;
  const c4 = rev ? r32Slots : [sfSlot];

  c1.forEach((d,i)=>{
    const s = rev ? 's8' : 's1';
    const sp = rev ? 8 : 1;
    const row = rev ? 1 : i+1;
    h+=`<div style="grid-column:1;grid-row:${row}/span ${sp};position:relative;z-index:1">${typeof d==='string'?renderSlotHtml(d,s):renderSlotHtml(d.id,s)}</div>`;
  });
  c2.forEach((d,i)=>{
    const s = rev ? 's4' : 's2';
    const sp = rev ? 4 : 2;
    const row = rev ? i*4+1 : i*2+1;
    h+=`<div style="grid-column:2;grid-row:${row}/span ${sp};position:relative;z-index:1">${typeof d==='string'?renderSlotHtml(d,s):renderSlotHtml(d.id,s)}</div>`;
  });
  c3.forEach((d,i)=>{
    const s = rev ? 's2' : 's4';
    const sp = rev ? 2 : 4;
    const row = rev ? i*2+1 : i*4+1;
    h+=`<div style="grid-column:3;grid-row:${row}/span ${sp};position:relative;z-index:1">${typeof d==='string'?renderSlotHtml(d,s):renderSlotHtml(d.id,s)}</div>`;
  });
  c4.forEach((d,i)=>{
    const s = rev ? 's1' : 's8';
    const sp = rev ? 1 : 8;
    const row = rev ? i+1 : 1;
    h+=`<div style="grid-column:4;grid-row:${row}/span ${sp};position:relative;z-index:1">${typeof d==='string'?renderSlotHtml(d,s):renderSlotHtml(d.id,s)}</div>`;
  });

  h+='</div></div>'; // grid + quarter
  return h;
}


function renderSlotHtml(slotId,extraCls){
  const data=koSlot[slotId]||{};
  const b32=B32_DEF.find(x=>x.id===slotId)||{};
  const isB3Def=slotId.startsWith('R32_')&&b32.h==='3rd';
  const team=data.home||'';
  const needsB3=(!team||team==='3rd')&&isB3Def;
  let cls='bk-slot '+extraCls;
  if(slotId.startsWith('R32_')&&!cls.includes('s1')) cls+=' s1';
  if(needsB3) cls+=' b3-slot';
  const dataAttr=needsB3?` data-b3="${slotId}"`:'';
  // R32槽位：只显示一个队伍（单队伍落位）
  if(slotId.startsWith('R32_')){
    if(team&&team!=='3rd'){ cls+=' filled'; }
    if(team==='3rd'||(!team&&isB3Def)){
      return `<div class="${cls}"${dataAttr}><span class="b3-desc">📋 最佳第三</span></div>`;
    }
    if(team){
      return `<div class="${cls}"${dataAttr}><span class="flag">${flagImg(team,13)}</span><span class="team">${tname(team)}</span></div>`;
    }
    return `<div class="${cls}"${dataAttr}><span class="desc">TBD</span></div>`;
  }
  // R16+晋级槽：显示胜者（存在data.home里）
  if(data.home&&data.home!=='3rd'){ cls+=' filled'; }
  if(data.home==='3rd'){
    return `<div class="${cls}"${dataAttr}><span class="b3-desc">📋 最佳第三</span></div>`;
  }
  if(data.home){
    return `<div class="${cls}"${dataAttr}><span class="flag">${flagImg(data.home,13)}</span><span class="team">${tname(data.home)}</span></div>`;
  }
  return `<div class="${cls}"${dataAttr}><span class="desc">TBD</span></div>`;
}


// ========== BRACKET ZOOM & PAN ==========
let bScale=1, bPanX=0, bPanY=0;
let isPanning=false, panStartX=0, panStartY=0, panOrigX=0, panOrigY=0;

function applyTransform(){
  const el=document.getElementById('bracketCanvas');
  if(!el) return;
  el.style.transform=`translate(${bPanX}px,${bPanY}px) scale(${bScale})`;
  document.getElementById('zoomLabel').textContent=Math.round(bScale*100)+'%';
}
function bracketZoom(delta){
  const vp=document.getElementById('bracketViewport');
  if(!vp) return;
  const r=vp.getBoundingClientRect();
  const cx=r.width/2, cy=r.height/2;
  // scale around viewport center
  const newScale=Math.max(0.3,Math.min(3,bScale+delta));
  const ratio=newScale/bScale;
  bPanX=cx-(cx-bPanX)*ratio;
  bPanY=cy-(cy-bPanY)*ratio;
  bScale=newScale;
  applyTransform();
}
function bracketReset(){
  // 先重置到 1:1 让浏览器计算出自然尺寸
  bScale=1; bPanX=0; bPanY=0;
  applyTransform();
  setTimeout(()=>{
    const vp=document.getElementById('bracketViewport');
    const bc=document.getElementById('bracketCanvas');
    if(!vp||!bc) return;
    const vr=vp.getBoundingClientRect();
    const br=bc.getBoundingClientRect();
    if(br.width===0||br.height===0) { bracketReset(); return; }
    // 自适应缩放：完整对阵图刚好铺满视口，留 30px 边距
    const pad=30;
    const scaleX=(vr.width-pad*2)/br.width;
    const scaleY=(vr.height-pad*2)/br.height;
    bScale=Math.max(0.25, Math.min(scaleX, scaleY, 1.5));
    // 居中
    bPanX=(vr.width-br.width*bScale)/2;
    bPanY=(vr.height-br.height*bScale)/2;
    applyTransform();
  },150);
}
function setupBracketPan(){
  const vp=document.getElementById('bracketViewport');
  if(!vp) return;
  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    bracketZoom(e.deltaY>0?-0.1:0.1);
  },{passive:false});
  // 鼠标拖拽
  vp.addEventListener('mousedown',e=>{
    isPanning=true; panStartX=e.clientX; panStartY=e.clientY;
    panOrigX=bPanX; panOrigY=bPanY;
    vp.classList.add('grabbing');
  });
  window.addEventListener('mousemove',e=>{
    if(!isPanning) return;
    bPanX=panOrigX+(e.clientX-panStartX);
    bPanY=panOrigY+(e.clientY-panStartY);
    applyTransform();
  });
  window.addEventListener('mouseup',()=>{
    if(isPanning){ isPanning=false; document.getElementById('bracketViewport')?.classList.remove('grabbing'); }
  });
  // 触屏拖拽
  vp.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      isPanning=true; panStartX=e.touches[0].clientX; panStartY=e.touches[0].clientY;
      panOrigX=bPanX; panOrigY=bPanY;
      vp.classList.add('grabbing');
    }
  },{passive:false});
  vp.addEventListener('touchmove',e=>{
    if(!isPanning||e.touches.length!==1) return;
    e.preventDefault();
    bPanX=panOrigX+(e.touches[0].clientX-panStartX);
    bPanY=panOrigY+(e.touches[0].clientY-panStartY);
    applyTransform();
  },{passive:false});
  vp.addEventListener('touchend',()=>{
    if(isPanning){ isPanning=false; document.getElementById('bracketViewport')?.classList.remove('grabbing'); }
  });
}

let _dataFingerprint = '';
function _getDataFingerprint() {
  const parts = [];
  for (const ms of Object.values(GROUP_MATCHES)) {
    for (const m of ms) {
      const s = scores[m.id];
      parts.push(m.id + ':' + (s ? s.join(',') : '--') + '|' + (matchStatus[m.id]||''));
    }
  }
  return parts.join(';');

// 静默更新积分榜（原地改表格数值，不重建DOM）
function silentPatchStandings() {
  const standings = calcStandings();
  const cards = document.querySelectorAll('#tab-groups .group-card');
  cards.forEach(card => {
    const header = card.querySelector('.group-header span');
    if (!header) return;
    const g = header.textContent.replace(' 组', '').trim();
    const rows = standings[g];
    if (!rows) return;
    const trs = card.querySelectorAll('tbody tr');
    rows.forEach((r, i) => {
      const tr = trs[i];
      if (!tr) return;
      const tds = tr.querySelectorAll('td');
      if (tds.length < 10) return;
      // 更新各列：P=3, W=4, D=5, L=6, GF=7, GA=8, GD=9, Pts=10
      tds[3].textContent = r.mp;
      tds[4].textContent = r.w;
      tds[5].textContent = r.d;
      tds[6].textContent = r.l;
      tds[7].textContent = r.gf;
      tds[8].textContent = r.ga;
      tds[9].textContent = (r.gd >= 0 ? '+' : '') + r.gd;
      tds[10].querySelector('b').textContent = r.pts;
      // 更新行样式（晋级/淘汰）
      tr.className = '';
      if (i < 2) { tr.className = 'top2'; tds[0].className = 'rank-dot pos-2'; }
      else if (i === 2) { tr.className = 'third'; tds[0].className = 'rank-dot pos-3'; }
      else { tr.className = 'elim'; tds[0].className = 'rank-dot pos-4'; }
    });
  });
  renderBest3rd(); // 最佳第三需要重算
}

// 静默更新比赛卡片（原地改DOM，不重建）
function silentPatchMatches(forceRebuild) {
  const cont = document.getElementById('tab-matches');
  const cards = cont.querySelectorAll('.match-card');
  if (!cards.length || forceRebuild) { renderMatches(); return; }

  const now = new Date();
  const tdyStr = `${now.getMonth()+1}月${now.getDate()}日`;
  const tom = new Date(now); tom.setDate(now.getDate()+1);
  const tomStr = `${tom.getMonth()+1}月${tom.getDate()}日`;

  let needRebuild = false;
  cards.forEach(card => {
    const mid = card.dataset.mid;
    if (!mid) return;
    // 找到对应的 match 数据
    const m = _matchMap[mid];
    if (!m) return;

    const s = scores[mid];
    const st = matchStatus[mid] || 'SCHEDULED';
    const clock = matchClock[mid] || '';

    // === 更新状态徽章 ===
    const statusEl = card.querySelector('.mc-status');
    if (statusEl) {
      const newLabel = st === 'LIVE' ? '直播中' : st === 'FINISHED' ? '完场' : '未开始';
      const newCls = 'mc-status ' + (st === 'LIVE' ? 'live' : st === 'FINISHED' ? 'finished' : 'upcoming');
      if (statusEl.textContent !== newLabel || statusEl.className !== newCls) {
        statusEl.textContent = newLabel;
        statusEl.className = newCls;
      }
    }

    // === 更新时钟 ===
    let clockEl = card.querySelector('.mc-clock');
    if (st === 'LIVE' && clock) {
      if (!clockEl) {
        clockEl = document.createElement('span');
        clockEl.className = 'mc-clock';
        const head = card.querySelector('.mc-head');
        if (head) head.appendChild(clockEl);
      }
      if (clockEl.textContent !== clock) clockEl.textContent = clock;
    } else if (clockEl && st !== 'LIVE') {
      clockEl.remove();
    }

    // === 更新比分 ===
    const dvals = card.querySelectorAll('.mc-detail .dval');
    if (s && s[0] !== null) {
      const ht = halftimeScores[mid];
      if (dvals[0]) dvals[0].textContent = ht ? `${ht[0]}-${ht[1]}` : '- -';
      if (dvals[1]) {
        dvals[1].textContent = `${s[0]}-${s[1]}`;
        if (st === 'FINISHED') dvals[1].classList.add('score-clickable');
        else dvals[1].classList.remove('score-clickable');
      }
      // 更新 "最终"/"实时" 标签
      const ditemLabels = card.querySelectorAll('.mc-detail .ditem');
      if (ditemLabels.length >= 2) {
        const labelNode = ditemLabels[1].childNodes[0];
        if (labelNode) labelNode.textContent = st === 'FINISHED' ? '最终' : '实时';
      }
    }

    // === 更新颜色标记 ===
    const isUpset = upsetMatches.includes(mid);
    card.classList.remove('card-today', 'card-tomorrow');
    if (!isUpset) {
      if (st === 'LIVE' || m.date === tdyStr) card.classList.add('card-today');
      else if (m.date === tomStr && predictions[mid] && isPredVisible(m.date)) card.classList.add('card-tomorrow');
    }

    // === 更新预测验证 ===
    if (st === 'FINISHED' && s && predictions[mid]) {
      let verifyEl = card.querySelector('.mc-verify');
      if (!verifyEl) {
        verifyEl = document.createElement('div');
        verifyEl.className = 'mc-verify';
        const body = card.querySelector('.mc-body');
        if (body) body.appendChild(verifyEl);
      }
      const p = predictions[mid];
      const scoreOk = p.score === `${s[0]}-${s[1]}` || p.scoreC === `${s[0]}-${s[1]}`;
      const actualWdl = s[0] > s[1] ? '主胜' : s[0] < s[1] ? '客胜' : '平局';
      const wdlOk = p.wdl === actualWdl;
      const goalsOk = p.goalsNum === s[0] + s[1];
      verifyEl.innerHTML = `<span>比赛结果</span><span>比分 <b class="${scoreOk?'v-ok':'v-no'}">${scoreOk?'✔':'❌'}</b></span><span>胜平负 <b class="${wdlOk?'v-ok':'v-no'}">${wdlOk?'✔':'❌'}</b></span><span>进球数 <b class="${goalsOk?'v-ok':'v-no'}">${goalsOk?'✔':'❌'}</b></span>`;
    }
  });

  // 检测是否有新的LIVE比赛出现或消失（这种情况需要重建）
  const visibleLive = cont.querySelectorAll('.match-card .mc-status.live').length;
  const actualLive = Object.values(matchStatus).filter(s => s === 'LIVE').length;
  if (visibleLive !== actualLive) needRebuild = true;

  if (needRebuild) {
    const scrollTop = cont.scrollTop;
    renderMatches();
    cont.scrollTop = scrollTop;
  }
}

// ========== TABS ==========
let currentTab='groups';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display=tab==='bracket'?'flex':'block';
  const btnMap={'groups':'btnTabGroups','matches':'btnTabMatches','bracket':'btnTabBracket','best3rd':'btnTabBest3rd'};
  const activeBtn=document.getElementById(btnMap[tab]);
  if(activeBtn) activeBtn.classList.add('active');
  if(tab==='standings') renderStandings();
  if(tab==='matches') renderMatches();
  if(tab==='bracket') renderBracket();
  if(tab==='best3rd') renderBest3rd();
}

// ========== 手动赛果/预测输入 ==========
let _editMid = null;
let _editPred = {score:[], wdl:[], goals:[]};

function openResultModal(mid) {
  _editMid = mid;
  const m = findMatch(mid);
  const sc = scores[mid] || [null, null];
  const ht = halftimeScores[mid] || [null, null];
  document.getElementById('resultModalTitle').textContent = `${m.home} vs ${m.away} - 赛果`;
  document.getElementById('resHtHome').textContent = m.home;
  document.getElementById('resHtAway').textContent = m.away;
  document.getElementById('resFtHome').textContent = m.home;
  document.getElementById('resFtAway').textContent = m.away;
  document.getElementById('resHtH').value = ht[0] !== null && ht[0] !== undefined ? ht[0] : '';
  document.getElementById('resHtA').value = ht[1] !== null && ht[1] !== undefined ? ht[1] : '';
  document.getElementById('resFtH').value = sc[0] !== null && sc[0] !== undefined ? sc[0] : '';
  document.getElementById('resFtA').value = sc[1] !== null && sc[1] !== undefined ? sc[1] : '';
  document.getElementById('resultModal').style.display = 'flex';
}

function closeResultModal() {
  document.getElementById('resultModal').style.display = 'none';
}

function saveResult() {
  const htH = parseInt(document.getElementById('resHtH').value) || 0;
  const htA = parseInt(document.getElementById('resHtA').value) || 0;
  const ftH = parseInt(document.getElementById('resFtH').value) || 0;
  const ftA = parseInt(document.getElementById('resFtA').value) || 0;
  if (!_editMid) return;
  halftimeScores[_editMid] = [htH, htA];
  scores[_editMid] = [ftH, ftA];
  matchStatus[_editMid] = 'FINISHED';
  saveScores();
  closeResultModal();
  renderMatches();
  renderStandings();
  renderBest3rd();
  fillBracket();
  checkGroupComplete();
}

function openPredModal(mid) {
  _editMid = mid;
  const m = findMatch(mid);
  document.getElementById('predModalTitle').textContent = `${m.home} vs ${m.away} - 预测`;
  document.getElementById('predHome').textContent = m.home;
  document.getElementById('predAway').textContent = m.away;
  const existing = predictions[mid];
  _editPred = {score:[], wdl:[], goals:[]};

  // Restore existing
  if (existing) {
    if (existing.score && Array.isArray(existing.score)) _editPred.score = existing.score.slice();
    if (existing.wdl) _editPred.wdl = [existing.wdl];
    if (existing.goals) _editPred.goals = Array.isArray(existing.goals) ? existing.goals.slice() : [existing.goals];
  }

  // Reset inputs
  document.getElementById('predH1').value = _editPred.score[0] || '';
  document.getElementById('predA1').value = _editPred.score[1] || '';
  document.getElementById('predH2').value = _editPred.score[2] || '';
  document.getElementById('predA2').value = _editPred.score[3] || '';

  // Reset option highlights
  document.querySelectorAll('#predWdlOptions .pred-option').forEach(el => {
    el.classList.toggle('sel', _editPred.wdl.includes(el.dataset.v));
  });
  document.querySelectorAll('#predGoalsOptions .pred-option').forEach(el => {
    el.classList.toggle('sel', _editPred.goals.includes(el.dataset.v));
  });

  document.getElementById('predModal').style.display = 'flex';
}

function closePredModal() {
  document.getElementById('predModal').style.display = 'none';
}

function savePrediction() {
  const h1 = parseInt(document.getElementById('predH1').value);
  const a1 = parseInt(document.getElementById('predA1').value);
  const h2 = parseInt(document.getElementById('predH2').value);
  const a2 = parseInt(document.getElementById('predA2').value);
  if (!_editMid) return;

  const sc = [];
  if (!isNaN(h1) && !isNaN(a1)) sc.push(h1, a1);
  if (!isNaN(h2) && !isNaN(a2)) sc.push(h2, a2);

  predictions[_editMid] = {
    score: sc.length >= 2 ? sc.join('-') : '',
    wdl: _editPred.wdl[0] || '',
    wdlLabel: _editPred.wdl[0] || '',
    goals: _editPred.goals.join(',') || '',
    locked: true,
    reason: '手动输入',
    confidence: '',
  };

  saveScores();
  // Re-render modal with updated data
  const m = findMatch(_editMid);
  if (m) showMatchDetail(m);
  renderMatches();
  closePredModal();
}

// 预测选项点击事件
document.addEventListener('click', function(e) {
  const opt = e.target.closest('.pred-option');
  if (!opt) return;
  const v = opt.dataset.v;
  if (!v) return;
  const parent = opt.parentElement;
  const isWdl = parent.id === 'predWdlOptions';
  const arr = isWdl ? _editPred.wdl : _editPred.goals;
  const maxSelect = isWdl ? 1 : 2;

  if (arr.includes(v)) {
    const idx = arr.indexOf(v);
    arr.splice(idx, 1);
  } else {
    if (arr.length >= maxSelect) arr.shift();
    arr.push(v);
  }
  // Refresh highlights
  parent.querySelectorAll('.pred-option').forEach(el => {
    el.classList.toggle('sel', arr.includes(el.dataset.v));
  });
});

// ========== INIT ==========
async function initPage() {
  await loadScores();
  renderStandings(); renderBest3rd();
  loadUpsets().then(() => { renderMatches(); });
}
try { initPage(); } catch(e) {
  console.error('INIT error:', e);
  document.body.innerHTML += '<div style="color:red;padding:20px">初始化错误: '+e.message+'<br>请按F12查看控制台</div>';
}
// CORS代理在公网可能失败，保证即使ESPN连不上页面也有数据
window.addEventListener('error', function(e) {
  console.warn('全局JS错误:', e.message);
});
window.addEventListener('unhandledrejection', function(e) {
  console.warn('未处理的Promise拒绝:', e.reason);
});
</script>
