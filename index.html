<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 United States, Canada, Mexico</title>
<style>
:root {
  --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9;
  --muted:#8b949e; --gold:#f0c040; --green:#3fb950; --red:#f85149;
  --blue:#58a6ff; --accent:#d2a8ff; --up:#2ea043; --down:#1f6feb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:16px}
h1{text-align:center;font-size:26px;margin-bottom:4px}
#yearBadge{font-weight:bold;color:#2ea04f}

.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
.tab-btn:hover,.tab-btn.active{border-color:var(--gold);color:var(--gold)}

.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:12px;margin-bottom:20px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.group-header{padding:8px 14px;font-weight:bold;font-size:15px;border-bottom:1px solid var(--border);background:#1a1f2b;display:flex;justify-content:space-between;align-items:center}
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{background:#1a1f2b;padding:6px 8px;text-align:center;color:var(--muted);font-weight:normal;font-size:11px;border-bottom:1px solid var(--border)}
.standings-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(48,54,61,.5)}
.standings-table .team-name{text-align:left;font-weight:bold}
.standings-table tr.top2 td{background:rgba(63,185,80,.08)}
.standings-table tr.third td{background:rgba(210,168,255,.06)}
.standings-table tr.elim td{opacity:.45}

/* match cards */
#tab-matches{padding:12px;overflow-y:auto;height:calc(100vh - 160px)}
.match-date-block{margin-bottom:16px}
.match-date-header{font-weight:bold;font-size:14px;color:var(--gold);margin-bottom:8px;padding-left:4px}
.match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1200px){.match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.match-grid{grid-template-columns:1fr;gap:8px}#tab-matches{padding:8px;height:calc(100vh - 140px)}}
.match-card{border:1px solid rgba(240,192,64,.35);border-radius:8px;background:var(--card);overflow:hidden;transition:.15s;position:relative;cursor:pointer}
.match-card:hover{border-color:rgba(240,192,64,.6)}
.match-card.card-today{background:rgba(46,160,67,.1);border-color:rgba(46,160,67,.45)}
.mc-head{padding:6px 10px;font-size:11px;background:rgba(240,192,64,.08);display:flex;justify-content:space-between;align-items:center}
.mc-body{padding:8px;display:flex;align-items:center;gap:6px;justify-content:center}
.mc-vs{display:flex;align-items:center;gap:4px;font-size:14px}
.mc-vs .score{font-size:18px;font-weight:bold;color:var(--gold);min-width:60px;text-align:center}
.mc-vs .ht{font-size:11px;color:var(--muted);text-align:center;cursor:pointer}
.mc-status{font-size:10px;padding:2px 6px;border-radius:4px}
.mc-status.finished{background:rgba(63,185,80,.15);color:var(--green)}
.mc-status.live{background:rgba(255,68,68,.15);color:#ff4444;animation:pulse 1.5s infinite}
.mc-status.upcoming{background:rgba(138,148,158,.1);color:var(--muted)}

/* modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:500px;width:90vw;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:8px;right:12px;font-size:20px;cursor:pointer;color:var(--muted);background:none;border:none}
.modal-header{padding:16px 20px 8px}
.modal-header .mh-teams{font-size:18px;font-weight:bold;display:flex;align-items:center;gap:12px;justify-content:center}
.modal-section{padding:10px 20px}
.modal-section h4{font-size:13px;color:var(--gold);margin-bottom:8px}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);cursor:pointer;font-size:13px;transition:.15s}
.btn:hover{border-color:var(--gold)}
.btn-primary{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}

/* prediction popup */
.pred-section{margin-bottom:16px}
.pred-section h4{font-size:13px;color:var(--gold);margin-bottom:8px}
.pred-options{display:flex;flex-wrap:wrap;gap:6px}
.pred-option{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;transition:.15s}
.pred-option.selected{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.1)}
.pred-option.multi-selected{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.1)}

/* result input */
.result-input{display:flex;gap:12px;align-items:center;justify-content:center;margin:12px 0}
.result-input input{width:50px;text-align:center;padding:4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:18px}
.result-input .label{font-size:12px;color:var(--muted)}

/* upset */
.upset-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px}

/* best 3rd */
.best3rd-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.best3rd-table th{background:#1a1f2b;padding:6px 8px;text-align:center;color:var(--muted);font-weight:normal;font-size:11px;border-bottom:1px solid var(--border)}
.best3rd-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(48,54,61,.5)}
.best3rd-table .qualify td{background:rgba(63,185,80,.08)}
.best3rd-table .miss td{opacity:.45}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<h1>FIFA World Cup <span id="yearBadge">2026</span> United States, Canada, Mexico</h1>
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('groups',this)">积分榜</button>
  <button class="tab-btn" onclick="showTab('matches',this)">赛程</button>
  <button class="tab-btn" onclick="showTab('best3rd',this)">最佳第三</button>
  <button class="tab-btn" onclick="showTab('bracket',this)">淘汰赛</button>
</div>

<div id="tab-groups"></div>
<div id="tab-matches" style="display:none"></div>
<div id="tab-best3rd" style="display:none"></div>
<div id="tab-bracket" style="display:none"></div>

<!-- Match Detail Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-panel" id="modal-panel"></div>
</div>

<!-- Result Input Modal -->
<div id="result-modal" class="modal-overlay" style="display:none">
  <div class="modal-panel">
    <div class="modal-header">
      <span id="result-modal-title">输入赛果</span>
      <button class="modal-close" onclick="closeResultModal()">&times;</button>
    </div>
    <div class="modal-section">
      <div class="result-input">
        <div>
          <div class="label">半场</div>
          <input type="number" id="result-ht-h" min="0" max="20" value="0">
          <span style="color:var(--muted)">:</span>
          <input type="number" id="result-ht-a" min="0" max="20" value="0">
        </div>
        <div>
          <div class="label">全场</div>
          <input type="number" id="result-ft-h" min="0" max="20" value="0">
          <span style="color:var(--muted)">:</span>
          <input type="number" id="result-ft-a" min="0" max="20" value="0">
        </div>
      </div>
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-primary" onclick="saveResult()">保存赛果</button>
        <button class="btn" onclick="closeResultModal()">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- Prediction Modal -->
<div id="pred-modal" class="modal-overlay" style="display:none">
  <div class="modal-panel" style="max-width:600px">
    <div class="modal-header">
      <span id="pred-modal-title">比赛预测</span>
      <button class="modal-close" onclick="closePredModal()">&times;</button>
    </div>
    <div class="modal-section" id="pred-modal-body"></div>
  </div>
</div>

<!-- Upset Confirm Modal -->
<div id="upset-modal" class="modal-overlay" style="display:none">
  <div class="modal-panel" style="max-width:360px">
    <div class="modal-header">
      <span>标记爆冷？</span>
      <button class="modal-close" onclick="closeUpsetModal()">&times;</button>
    </div>
    <div class="modal-section" style="text-align:center">
      <p style="margin-bottom:12px;font-size:14px" id="upset-modal-text"></p>
      <button class="btn btn-danger" onclick="confirmUpset(true)">确认爆冷</button>
      <button class="btn" onclick="confirmUpset(false)" style="margin-left:8px">取消</button>
    </div>
  </div>
</div>

<script>
// ========== SCF 配置 ==========
const SCF = 'https://1443588797-jduje0b8vt.ap-guangzhou.tencentscf.com';

// ========== 数据定义 ==========
const GROUPS = {
  'A': ['墨西哥','南非','韩国','捷克'],
  'B': ['加拿大','波黑','卡塔尔','瑞士'],
  'C': ['巴西','摩洛哥','海地','苏格兰'],
  'D': ['美国','巴拉圭','澳大利亚','土耳其'],
  'E': ['德国','库拉索','科特迪瓦','厄瓜多尔'],
  'F': ['荷兰','日本','瑞典','突尼斯'],
  'G': ['比利时','埃及','伊朗','新西兰'],
  'H': ['西班牙','佛得角','沙特阿拉伯','乌拉圭'],
  'I': ['法国','塞内加尔','伊拉克','挪威'],
  'J': ['阿根廷','阿尔及利亚','奥地利','约旦'],
  'K': ['葡萄牙','民主刚果','乌兹别克斯坦','哥伦比亚'],
  'L': ['英格兰','克罗地亚','加纳','巴拿马'],
};
const GROUP_LETTERS = 'ABCDEFGHIJKL';
const MATCH_TEMPLATE = [
  (h,a) => [h,a], (h,a) => [h+2,a+3], (h,a) => [h,h+2], (h,a) => [h+3,h+1], (h,a) => [h+3,h], (h,a) => [h+1,h+2]
];
function buildGroupMatches() {
  const gm = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    gm[g] = [];
    MATCH_TEMPLATE.forEach((fn, i) => {
      const [hi, ai] = fn(0,1);
      gm[g].push({ home: teams[hi], away: teams[ai], id: `${g}_${i}`, date: '' });
    });
  }
  return gm;
}
const GROUP_MATCHES = buildGroupMatches();

const NAME_MAP = {
  "Mexico":"墨西哥","South Africa":"南非","South Korea":"韩国","Czechia":"捷克",
  "Canada":"加拿大","Bosnia-Herzegovina":"波黑","Qatar":"卡塔尔","Switzerland":"瑞士",
  "Brazil":"巴西","Morocco":"摩洛哥","Haiti":"海地","Scotland":"苏格兰",
  "United States":"美国","Paraguay":"巴拉圭","Australia":"澳大利亚","Turkey":"土耳其",
  "Germany":"德国","Curaçao":"库拉索","Ivory Coast":"科特迪瓦","Ecuador":"厄瓜多尔",
  "Netherlands":"荷兰","Japan":"日本","Sweden":"瑞典","Tunisia":"突尼斯",
  "Belgium":"比利时","Egypt":"埃及","Iran":"伊朗","New Zealand":"新西兰",
  "Spain":"西班牙","Cape Verde":"佛得角","Saudi Arabia":"沙特阿拉伯","Uruguay":"乌拉圭",
  "France":"法国","Senegal":"塞内加尔","Iraq":"伊拉克","Norway":"挪威",
  "Argentina":"阿根廷","Algeria":"阿尔及利亚","Austria":"奥地利","Jordan":"约旦",
  "Portugal":"葡萄牙","Congo DR":"民主刚果","Uzbekistan":"乌兹别克斯坦","Colombia":"哥伦比亚",
  "England":"英格兰","Croatia":"克罗地亚","Ghana":"加纳","Panama":"巴拿马",
};

// ========== 状态 ==========
let scores = {};        // { mid: [h, a] } 全场比分
let halftimeScores = {}; // { mid: [h, a] } 半场比分
let matchStatus = {};   // { mid: 'FINISHED'|'LIVE'|'SCHEDULED' }
let predictions = {};   // { mid: { score:['1:0','2:0'], wdl:['主胜'], goals:['2','3'] } }
let upsetMatches = {};  // { mid: true }
let currentDetailMid = '';

// ========== SCF 读写 ==========
async function scfGet(path) {
  try {
    const r = await fetch(`${SCF}/${path}`);
    return await r.json();
  } catch(e) { console.warn(`SCF GET ${path} failed:`, e); return {}; }
}
async function scfPost(path, body) {
  try {
    const r = await fetch(`${SCF}/${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) { console.warn(`SCF POST ${path} failed:`, e); return {error: e.message}; }
}

async function loadAllData() {
  // 1. 尝试从 SCF 加载赛果
  let results = {};
  try { results = await (await fetch(`${SCF}/results`)).json(); } catch(e) { console.warn('SCF /results 失败，尝试 fallback'); }
  // 2. SCF 失败则 fallback 到 GitHub Pages JSON
  if (!results || Object.keys(results).length === 0) {
    try {
      const r = await fetch('https://BAILG-git.github.io/worldcup-26/data/results.json?t=' + Date.now());
      if (r.ok) results = await r.json();
      console.log('[loadAllData] 从 GitHub Pages 加载赛果:', Object.keys(results).length, '场');
    } catch(e) { console.warn('[loadAllData] GitHub Pages results.json 也加载失败', e.message); }
  } else {
    console.log('[loadAllData] 从 SCF 加载赛果:', Object.keys(results).length, '场');
  }
  for (const [mid, d] of Object.entries(results)) {
    if (d && d.score) { scores[mid] = d.score; matchStatus[mid] = 'FINISHED'; }
    if (d && d.ht) halftimeScores[mid] = d.ht;
  }
  // 加载预测（SCF -> GitHub Pages 兜底）
  let preds = {};
  try { preds = await (await fetch(`${SCF}/predictions`)).json(); } catch(e) {}
  if (!preds || Object.keys(preds).length === 0) {
    try { preds = await (await fetch('https://BAILG-git.github.io/worldcup-26/data/predictions.json?t=' + Date.now())).json(); } catch(e) {}
  }
  predictions = preds || {};
  // 加载爆冷
  let upsets = {};
  try { upsets = await (await fetch(`${SCF}/upsets`)).json(); } catch(e) {}
  upsetMatches = upsets || {};
  // 始终渲染（即使没有数据也要显示空表格）
  renderGroups();
  renderMatches();
  console.log('[loadAllData] done, results:', Object.keys(results).length, 'predictions:', Object.keys(predictions).length);
}

async function saveResultToSCF(mid) {
  const d = {};
  d[mid] = { score: scores[mid] || [0,0], ht: halftimeScores[mid] || [0,0] };
  const r = await scfPost('results', d);
  if (r.ok) console.log(`[saveResult] ${mid} saved`);
  else console.warn('[saveResult] failed', r.error);
}

async function savePredictionToSCF(mid) {
  const d = {};
  d[mid] = predictions[mid] || {};
  const r = await scfPost('predictions', d);
  if (r.ok) console.log(`[savePrediction] ${mid} saved`);
  else console.warn('[savePrediction] failed', r.error);
}

async function saveUpsetToSCF() {
  const r = await scfPost('upsets', upsetMatches);
  if (r.ok) console.log('[saveUpset] saved');
  else console.warn('[saveUpset] failed', r.error);
}

// ========== Tab 切换 ==========
function showTab(tab, btn) {
  document.getElementById('tab-groups').style.display = tab === 'groups' ? '' : 'none';
  document.getElementById('tab-matches').style.display = tab === 'matches' ? '' : 'none';
  document.getElementById('tab-best3rd').style.display = tab === 'best3rd' ? '' : 'none';
  document.getElementById('tab-bracket').style.display = tab === 'bracket' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'groups') renderGroups();
  if (tab === 'matches') renderMatches();
  if (tab === 'best3rd') renderBest3rd();
  if (tab === 'bracket') renderBracket();
}

// ========== 积分榜 ==========
function calcStandings() {
  const s = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    const rec = {};
    for (const t of teams) rec[t] = { team: t, pts: 0, mp: 0, gf: 0, ga: 0, gd: 0, w: 0, d: 0, l: 0 };
    for (const m of GROUP_MATCHES[g]) {
      const sc = scores[m.id];
      if (sc && sc[0] !== null) {
        const h = m.home, a = m.away;
        rec[h].mp++; rec[a].mp++;
        rec[h].gf += sc[0]; rec[a].gf += sc[1];
        rec[h].ga += sc[1]; rec[a].ga += sc[0];
        if (sc[0] > sc[1]) { rec[h].pts += 3; rec[h].w++; rec[a].l++; }
        else if (sc[0] < sc[1]) { rec[a].pts += 3; rec[a].w++; rec[h].l++; }
        else { rec[h].pts++; rec[a].pts++; rec[h].d++; rec[a].d++; }
      }
    }
    for (const t of teams) rec[t].gd = rec[t].gf - rec[t].ga;
    s[g] = Object.values(rec).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  }
  return s;
}

function flagImg(t) { return ''; }
function tname(t) { return t; }

function renderGroups() {
  const s = calcStandings();
  let html = '<div class="groups-grid">';
  for (const [g, rows] of Object.entries(s)) {
    html += `<div class="group-card"><div class="group-header"><span>${g} 组</span></div><table class="standings-table"><tr><th>#</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净胜</th><th>积分</th></tr>`;
    rows.forEach((r, i) => {
      let cls = i < 2 ? 'top2' : i === 2 ? 'third' : 'elim';
      html += `<tr class="${cls}"><td>${i + 1}</td><td class="team-name">${tname(r.team)}</td><td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd >= 0 ? '+' : ''}${r.gd}</td><td><b>${r.pts}</b></td></tr>`;
    });
    html += '</table></div>';
  }
  html += '</div>';
  document.getElementById('tab-groups').innerHTML = html;
}

// ========== 赛程列表 ==========
function renderMatches() {
  const today = new Date();
  const todayStr = `${today.getMonth()+1}月${today.getDate()}日`;
  let html = '';
  for (const g of GROUP_LETTERS) {
    for (const m of GROUP_MATCHES[g]) {
      const sc = scores[m.id];
      const ht = halftimeScores[m.id];
      const st = matchStatus[m.id] || 'SCHEDULED';
      const isUpset = upsetMatches[m.id];
      const pred = predictions[m.id];
      const stCls = st === 'FINISHED' ? 'finished' : st === 'LIVE' ? 'live' : 'upcoming';
      const stLabel = st === 'FINISHED' ? '完场' : st === 'LIVE' ? '直播中' : '未开始';
      const scoreStr = sc && sc[0] !== null ? `${sc[0]}-${sc[1]}` : '- -';
      const htStr = ht ? `${ht[0]}-${ht[1]}` : '';
      html += `<div class="match-card card-today" onclick="showMatchDetail('${m.id}')">
        <div class="mc-head"><span>${g}组</span><span>${m.id}</span></div>
        <div class="mc-body">
          <div class="mc-vs">
            <span>${m.home}</span>
            <div>
              <div class="score">${scoreStr}</div>
              <div class="ht" onclick="event.stopPropagation();showUpsetConfirm('${m.id}')">${htStr ? 'HT:'+htStr : '半场'}</div>
            </div>
            <span>${m.away}</span>
          </div>
        </div>
        <div class="mc-status ${stCls}">${stLabel}${isUpset ? '<span class="upset-badge">爆冷</span>' : ''}</div>
        ${pred ? `<div style="font-size:10px;color:var(--muted);padding:2px 8px;text-align:center">预测: ${pred.score ? pred.score.join('/') : ''} ${pred.wdl ? pred.wdl.join('/') : ''}</div>` : ''}
      </div>`;
    }
  }
  document.getElementById('tab-matches').innerHTML = html;
}

// ========== 比赛详情弹窗 ==========
function showMatchDetail(mid) {
  currentDetailMid = mid;
  const m = findMatch(mid);
  if (!m) return;
  const sc = scores[mid] || [null, null];
  const ht = halftimeScores[mid] || [null, null];
  const pred = predictions[mid] || {};
  const isUpset = upsetMatches[mid];
  let html = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <div class="mh-teams">
        <span>${m.home}</span>
        <span style="color:var(--muted)">vs</span>
        <span>${m.away}</span>
      </div>

  `;

  document.getElementById('modal-overlay').style.display = '';

function findMatch(mid) {
  for (const ms of Object.values(GROUP_MATCHES))
    for (const m of ms) if (m.id === mid) return m;
  return null;
}

function openResultModal(mid) {
  currentDetailMid = mid;

const SCORE_OPTIONS = [
  '1:0','2:0','2:1','3:0','3:1','3:2','4:0','4:1','4:2','5:0','5:1','5:2',
  '0:0','1:1','2:2','3:3',
  '0:1','0:2','1:2','0:3','1:3','2:3','0:4','1:4','2:4','0:5','1:5','2:5'
];
const WDL_OPTIONS = ['主胜','平局','客胜'];
const GOALS_OPTIONS = ['1','2','3','4','5','6','7+'];

let tempPred = { score: [], wdl: [], goals: [] };

function openPredModal(mid) {
  currentDetailMid = mid;
  const existing = predictions[mid] || {};
  tempPred = {
    score: existing.score || [],
    wdl: existing.wdl || [],
    goals: existing.goals || []
  };
  renderPredModalContent(mid);
  document.getElementById('pred-modal').style.display = '';
}

function renderPredModalContent(mid) {
  const m = findMatch(mid);
  let html = `<div style="margin-bottom:8px;color:var(--muted);font-size:13px">${m.home} vs ${m.away}</div>`;
  
  // 比分选择（最多2个）
  html += '<div class="pred-section"><h4>比分预测（最多选2个）</h4><div class="pred-options">';
  for (const s of SCORE_OPTIONS) {
    const selected = tempPred.score.includes(s);
    html += `<div class="pred-option ${selected?'multi-selected':''}" onclick="togglePredOption('score','${s}')">${s}</div>`;
  }
  html += '</div></div>';
  
  // 胜平负（最多1个）
  html += '<div class="pred-section"><h4>胜平负预测（选1个）</h4><div class="pred-options">';
  for (const w of WDL_OPTIONS) {
    const selected = tempPred.wdl.includes(w);
    html += `<div class="pred-option ${selected?'selected':''}" onclick="togglePredOption('wdl','${w}')">${w}</div>`;
  }
  html += '</div></div>';
  
  // 进球数（最多2个）
  html += '<div class="pred-section"><h4>进球数预测（最多选2个）</h4><div class="pred-options">';
  for (const g of GOALS_OPTIONS) {
    const selected = tempPred.goals.includes(g);
    html += `<div class="pred-option ${selected?'multi-selected':''}" onclick="togglePredOption('goals','${g}')">${g}</div>`;
  }
  html += '</div></div>';
  
  html += `<div style="text-align:center;margin-top:16px">
    <button class="btn btn-primary" onclick="savePrediction('${mid}')">保存预测</button>
    <button class="btn" onclick="closePredModal()" style="margin-left:8px">取消</button>
  </div>`;
  
  document.getElementById('pred-modal-body').innerHTML = html;
}

function togglePredOption(type, value) {
  if (type === 'wdl') {
    tempPred.wdl = [value];
  } else {
    const arr = tempPred[type];
    const idx = arr.indexOf(value);
    if (idx >= 0) arr.splice(idx, 1);
    else if (arr.length < 2) arr.push(value);
  }
  renderPredModalContent(currentDetailMid);
}

async function savePrediction(mid) {
  predictions[mid] = { score: tempPred.score, wdl: tempPred.wdl, goals: tempPred.goals };
  closePredModal();
  await savePredictionToSCF(mid);
  renderMatches();
  if (document.getElementById('modal-overlay').style.display !== 'none') {
    showMatchDetail(mid);
  }
}

function closePredModal() { document.getElementById('pred-modal').style.display = 'none'; }

let upsetConfirmMid = '';
function showUpsetConfirm(mid) {
  upsetConfirmMid = mid;

async function confirmUpset(yes) {

  closeUpsetModal();

}

// ========== Tiebreak 工具函数 ==========
const fairPlay = {};
function tieHash(a, b) {
  let h = 0;
  for (const s of [a, b]) { for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; }
  return a > b ? -1 : 1;
}
function fairPlayCompare(a, b) { return (fairPlay[b] || 0) - (fairPlay[a] || 0); }

// 跨组最佳第三排名 tiebreak: 1.积分 2.净胜球 3.进球 4.公平竞赛 5.抽签
function calcBestThirds(s) {
  const t = [];
  for (const [g, r] of Object.entries(s)) t.push({ ...r[2], group: g });
  t.sort((a, b) =>
    b.pts - a.pts ||
    b.gd - a.gd ||
    b.gf - a.gf ||
    ((fairPlay[a.team] || 0) - (fairPlay[b.team] || 0)) ||
    tieHash(a.team, b.team)
  );
  return t;
}

function renderBest3rd() {
  const s = calcStandings();
  const thirds = calcBestThirds(s);
  let html = '<div style="max-width:800px;margin:0 auto"><h3 style="margin-bottom:8px;color:var(--gold)">最佳第三排名（前8名晋级淘汰赛）</h3>';
  html += '<table class="best3rd-table"><tr><th>排名</th><th>小组</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净胜</th><th>积分</th><th>状态</th></tr>';
  thirds.forEach((t, i) => {
    const cls = i < 8 ? 'qualify' : 'miss';
    html += `<tr class="${cls}"><td>${i + 1}</td><td>${t.group}</td>
      <td class="team-name">${tname(t.team)}</td>
      <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd >= 0 ? '+' : ''}${t.gd}</td>
      <td><b>${t.pts}</b></td><td>${i < 8 ? '✅ 晋级' : '❌ 淘汰'}</td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('tab-best3rd').innerHTML = html;
}
